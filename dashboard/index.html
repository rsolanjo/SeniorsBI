<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeniorsBI — Painel de Operações</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--brand:#2B4C9B;--accent:#E04622;--bg:#f0f4fa;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--subtle:#94a3b8}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Cards */
.card{background:var(--card);border-radius:.875rem;padding:1.25rem;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-flat{background:var(--card);border-radius:.75rem;padding:1rem;border:1px solid var(--border)}

/* KPI */
.kpi-big{font-size:1.875rem;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.02em}
.kpi-lbl{font-size:.65rem;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:.25rem}

/* Tabs */
.tab-btn{padding:.4rem .9rem;border-radius:.5rem;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:transparent;white-space:nowrap}
.tab-btn.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(43,76,155,.25)}
.tab-btn:hover:not(.active){background:#f1f5f9;color:var(--text)}

/* Sub-tabs */
.sub-tab{padding:.35rem .9rem;border-radius:.4rem;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:transparent}
.sub-tab.active{background:#dbeafe;color:var(--brand)}

/* Company filter buttons */
.comp-btn{padding:.35rem .85rem;border-radius:.5rem;font-size:.72rem;font-weight:700;border:1px solid var(--border);background:white;color:var(--muted);cursor:pointer;transition:all .15s}
.comp-btn.active{background:var(--brand);border-color:var(--brand);color:white;box-shadow:0 2px 6px rgba(43,76,155,.2)}

/* Time filter pills */
.time-btn{padding:.3rem .7rem;border-radius:.4rem;font-size:.72rem;font-weight:600;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.time-btn.active{background:var(--brand);color:white}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:.2rem;padding:.15rem .5rem;border-radius:9999px;font-size:.67rem;font-weight:700}
.badge-g{background:#dcfce7;color:#166534}
.badge-y{background:#fef9c3;color:#854d0e}
.badge-r{background:#fee2e2;color:#991b1b}
.badge-b{background:#dbeafe;color:#1e40af}
.badge-o{background:#ffedd5;color:#9a3412}

/* Bars */
.bar{height:.4rem;border-radius:9999px;background:var(--brand);transition:width .6s ease}
.bar-warn{background:#f59e0b}
.bar-danger{background:#ef4444}

/* Tags */
.tag{display:inline-block;padding:.1rem .4rem;border-radius:.25rem;font-size:.65rem;background:#f1f5f9;border:1px solid var(--border);color:var(--muted);font-weight:500}

/* Heatmap */
.hcell{width:2rem;height:2rem;border-radius:.3rem;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800}

/* SPOF */
.spof-badge{background:#fee2e2;color:#991b1b;padding:.1rem .35rem;border-radius:.25rem;font-size:.6rem;font-weight:800}

/* Pulse */
.pulse{width:.55rem;height:.55rem;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* Loader */
#loading{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:99;flex-direction:column;gap:1rem}
.spinner{width:2.25rem;height:2.25rem;border:3px solid #e2e8f0;border-top-color:var(--brand);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tables */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:.5rem .75rem;font-size:.67rem;color:var(--subtle);border-bottom:2px solid var(--border);white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
td{padding:.55rem .75rem;font-size:.8rem;border-bottom:1px solid #f1f5f9;color:var(--text)}
tr:last-child td{border:none}
tr:hover td{background:#fafbfd}

/* Modal overlay */
.modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:white;border-radius:1rem;max-width:30rem;width:100%;padding:1.5rem;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.18)}

/* Form elements */
.fi{background:#f8fafc;border:1px solid var(--border);border-radius:.5rem;padding:.55rem .75rem;font-size:.85rem;color:var(--text);width:100%;outline:none;font-family:inherit}
.fi:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(43,76,155,.08)}
.fl{display:block;font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}

/* Toast */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:70;background:white;border:1px solid var(--border);border-radius:.875rem;padding:.75rem 1.25rem;box-shadow:0 12px 40px rgba(0,0,0,.12);display:flex;align-items:center;gap:.75rem;transform:translateY(120px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}

/* Logo cards */
.logo-pill{background:white;border:1px solid var(--border);border-radius:.625rem;padding:.3rem .55rem;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}

/* Action buttons in tables */
.act-btn{background:none;border:none;cursor:pointer;font-size:.72rem;font-weight:600;padding:.2rem .45rem;border-radius:.3rem;transition:all .12s}
.act-edit{color:var(--brand)} .act-edit:hover{background:#dbeafe}
.act-arch{color:var(--subtle)} .act-arch:hover{background:#f1f5f9}
.act-del{color:#ef4444} .act-del:hover{background:#fee2e2}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <svg width="52" height="40" viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="40" cy="28" rx="38" ry="24" fill="#2B4C9B" stroke="#E04622" stroke-width="3"/>
    <text x="40" y="27" text-anchor="middle" font-size="19" font-weight="900" fill="#fff" font-family="Arial Black,Arial">4</text>
    <text x="40" y="40" text-anchor="middle" font-size="9" font-weight="700" fill="#93c5fd" font-family="Arial">SENIORS</text>
  </svg>
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:.85rem;margin-top:.25rem">Conectando ao SeniorsBI…</p>
</div>

<!-- APP -->
<div id="app" class="hidden min-h-screen flex flex-col">

<!-- ═══ HEADER ═══════════════════════════════════════════════════════════════ -->
<header style="background:white;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:40;" class="px-5 py-2.5">
  <div class="flex items-center justify-between gap-4">

    <!-- Logos + título -->
    <div class="flex items-center gap-3">
      <!-- 4Seniors -->
      <div class="logo-pill">
        <svg width="52" height="30" viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="40" cy="24" rx="38" ry="21" fill="#2B4C9B" stroke="#E04622" stroke-width="3"/>
          <text x="40" y="24" text-anchor="middle" font-size="18" font-weight="900" fill="#fff" font-family="Arial Black,Arial" dominant-baseline="middle">4</text>
          <text x="40" y="38" text-anchor="middle" font-size="8.5" font-weight="700" fill="#93c5fd" font-family="Arial">SENIORS</text>
        </svg>
      </div>
      <!-- S4SYS -->
      <div class="logo-pill">
        <svg width="56" height="30" viewBox="0 0 90 48" xmlns="http://www.w3.org/2000/svg">

          <text x="45" y="31" text-anchor="middle" font-size="17" font-weight="900" fill="#fff" font-family="Arial Black,Arial" letter-spacing="1">S4SYS</text>
        </svg>
      </div>
      <!-- Porto Virtual -->
      <div class="logo-pill">
        <svg width="76" height="30" viewBox="0 0 120 48" xmlns="http://www.w3.org/2000/svg">

      <!-- Divisor + título -->
      <div style="border-left:2px solid #e2e8f0;padding-left:.875rem;">

    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <div class="pulse" id="liveDot"></div>
        <span style="font-size:.72rem;color:#64748b;font-weight:500;" id="liveStatus">Conectando…</span>
      </div>
      <span style="font-size:.67rem;color:#94a3b8;" id="lastUpdate"></span>
    </div>
  </div>
</header>

<!-- ═══ FILTRO ROTATIVO ═══════════════════════════════════════════════════════ -->
<div style="background:white;border-bottom:1px solid #e2e8f0;padding:.55rem 1.25rem;">
  <div class="flex items-center gap-4 flex-wrap">

    <!-- Status rotativo -->
    <div class="flex items-center gap-2.5" style="min-width:14rem;">
      <div id="rotDot" style="width:.55rem;height:.55rem;border-radius:50%;background:#2B4C9B;animation:pulse 2s infinite;flex-shrink:0;"></div>
      <div>
        <div style="font-size:.6rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.09em;">Filtro Rotativo</div>
        <div class="flex items-center gap-2">
          <span id="rotLabel" style="font-size:.82rem;font-weight:800;color:#1e293b;">Todas as Empresas</span>
          <span id="rotCount" style="font-size:.67rem;background:#f1f5f9;color:#64748b;padding:.1rem .4rem;border-radius:.3rem;font-family:monospace;font-weight:700;">30s</span>
        </div>
      </div>
    </div>

    <!-- Barra de progresso -->
    <div style="flex:1;max-width:16rem;height:.3rem;background:#f1f5f9;border-radius:9999px;overflow:hidden;border:1px solid #e2e8f0;">
      <div id="rotProgress" style="height:100%;background:#2B4C9B;width:100%;transition:width 1s linear;"></div>
    </div>

    <!-- Botões empresa -->
    <div class="flex items-center gap-1.5">
      <button class="comp-btn active" onclick="selectCompany('all')" id="cbAll">Todos</button>
      <button class="comp-btn" onclick="selectCompany('4Seniors')" id="cb4S">4Seniors</button>
      <button class="comp-btn" onclick="selectCompany('S4SYS')" id="cbS4">S4SYS</button>
      <button class="comp-btn" onclick="selectCompany('Porto Virtual')" id="cbPV">Porto Virtual</button>
      <button onclick="toggleRot()" id="btnRot" style="padding:.3rem .5rem;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:.4rem;cursor:pointer;color:#64748b;display:flex;align-items:center;" title="Pausar/Retomar">
        <i data-lucide="pause" style="width:.875rem;height:.875rem;" id="rotIcon"></i>
      </button>
    </div>

    <!-- Separador -->
    <div style="width:1px;height:1.5rem;background:#e2e8f0;flex-shrink:0;"></div>

    <!-- Filtro temporal -->
    <div style="display:flex;align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:.5rem;padding:.15rem;">
      <button class="time-btn active" onclick="setTime('atual')" id="t-atual">Atual</button>
      <button class="time-btn" onclick="setTime('7d')" id="t-7d">Últ. semana</button>
      <button class="time-btn" onclick="setTime('30d')" id="t-30d">30 dias</button>
      <button class="time-btn" onclick="setTime('12m')" id="t-12m">12 meses</button>
      <button class="time-btn" onclick="setTime('picker')" id="t-picker">Mês/Ano</button>
    </div>

    <!-- Month picker (visível só em 'picker') -->
    <select id="selMes" class="hidden fi" style="width:auto;padding:.3rem .65rem;font-size:.78rem;">
      <option value="">Carregando…</option>
    </select>
  </div>
</div>

<!-- ═══ TABS ══════════════════════════════════════════════════════════════════ -->
<nav style="background:white;border-bottom:1px solid #e2e8f0;" class="flex gap-0.5 px-4 py-1.5 overflow-x-auto">
  <button class="tab-btn active" onclick="setTab('exec')">Executivo</button>
  <button class="tab-btn" onclick="setTab('prod')">Produtividade</button>
  <button class="tab-btn" onclick="setTab('custo')">Custos &amp; Margem</button>
  <button class="tab-btn" onclick="setTab('cli')">Clientes</button>
  <button class="tab-btn" onclick="setTab('sla')">SLA &amp; Op.</button>

  </button>
</nav>

<!-- ═══ MAIN ══════════════════════════════════════════════════════════════════ -->
<main class="flex-1 p-5 overflow-auto" id="main"></main>

</div><!-- /app -->

<!-- ═══ MODAL: Contrato ═══════════════════════════════════════════════════════ -->
<div id="modalContract" class="modal-ov hidden">
  <div class="modal-box">
    <button onclick="closeModal('modalContract')" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:#94a3b8;"><i data-lucide="x" style="width:1.1rem;height:1.1rem;"></i></button>
    <h3 id="mCTitle" style="font-size:.95rem;font-weight:800;color:#1e293b;margin-bottom:1rem;">Editar Contrato</h3>
    <form onsubmit="saveContract(event)" class="space-y-4">
      <input type="hidden" id="cOld">
      <div><label class="fl">Cliente / Empresa</label><input type="text" id="cCliente" class="fi" required placeholder="Nome do cliente"></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="fl">Franquia (h/mês)</label><input type="number" id="cFranquia" class="fi" min="0" required placeholder="0"></div>
        <div><label class="fl">Valor Mensal (R$)</label><input type="number" id="cValor" class="fi" min="0" step="0.01" required placeholder="0,00"></div>
      </div>
      <div><label class="fl">Status</label>
        <select id="cStatus" class="fi">
          <option value="ativo">Ativo</option>
          <option value="pausado">Pausado</option>
          <option value="arquivado">Arquivado</option>
        </select>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:.5rem;padding-top:.75rem;border-top:1px solid #f1f5f9;">
        <button type="button" onclick="closeModal('modalContract')" style="padding:.45rem 1rem;background:#f1f5f9;border:none;border-radius:.5rem;font-size:.78rem;font-weight:700;color:#64748b;cursor:pointer;">Cancelar</button>
        <button type="submit" style="padding:.45rem 1.1rem;background:var(--brand);border:none;border-radius:.5rem;font-size:.78rem;font-weight:700;color:white;cursor:pointer;">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ MODAL: Funcionário ════════════════════════════════════════════════════ -->
<div id="modalFunc" class="modal-ov hidden">
  <div class="modal-box">
    <button onclick="closeModal('modalFunc')" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:#94a3b8;"><i data-lucide="x" style="width:1.1rem;height:1.1rem;"></i></button>
    <h3 id="mFTitle" style="font-size:.95rem;font-weight:800;color:#1e293b;margin-bottom:.5rem;">Editar Funcionário</h3>
    <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:.5rem;padding:.55rem .75rem;margin-bottom:1rem;font-size:.75rem;color:#854d0e;line-height:1.4;">
      <strong>Atenção:</strong> Esta alteração não modifica registros históricos de horas. Novos valores valem apenas para cálculos futuros.
    </div>
    <form onsubmit="saveFunc(event)" class="space-y-4">
      <input type="hidden" id="fOld">
      <div><label class="fl">Nome</label><input type="text" id="fNome" class="fi" required></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="fl">Nível</label>
          <select id="fNivel" class="fi">
            <option value="N1">N1</option><option value="N2">N2</option><option value="N3">N3</option>
            <option value="Gestão">Gestão</option><option value="LGPD">LGPD</option>
          </select>
        </div>
        <div><label class="fl">Equipe</label><input type="text" id="fEquipe" class="fi" placeholder="ex: Suporte, Cloud…"></div>
      </div>
      <div><label class="fl">Capacidade Mensal (h)</label><input type="number" id="fCap" class="fi" min="1" required placeholder="168"></div>
      <div style="display:flex;justify-content:flex-end;gap:.5rem;padding-top:.75rem;border-top:1px solid #f1f5f9;">
        <button type="button" onclick="closeModal('modalFunc')" style="padding:.45rem 1rem;background:#f1f5f9;border:none;border-radius:.5rem;font-size:.78rem;font-weight:700;color:#64748b;cursor:pointer;">Cancelar</button>
        <button type="submit" style="padding:.45rem 1.1rem;background:var(--brand);border:none;border-radius:.5rem;font-size:.78rem;font-weight:700;color:white;cursor:pointer;">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ MODAL: Confirmar ══════════════════════════════════════════════════════ -->
<div id="modalConfirm" class="modal-ov hidden">
  <div class="modal-box" style="max-width:24rem;">
    <h3 style="font-size:.95rem;font-weight:800;color:#1e293b;margin-bottom:.5rem;">Confirmar exclusão</h3>
    <p id="confirmMsg" style="font-size:.85rem;color:#64748b;margin-bottom:1.25rem;line-height:1.5;"></p>
    <div style="display:flex;justify-content:flex-end;gap:.5rem;">
      <button onclick="closeModal('modalConfirm')" style="padding:.45rem 1rem;background:#f1f5f9;border:none;border-radius:.5rem;font-size:.78rem;font-weight:700;color:#64748b;cursor:pointer;">Cancelar</button>
      <button id="confirmOk" style="padding:.45rem 1rem;background:#ef4444;border:none;border-radius:.5rem;font-size:.78rem;font-weight:700;color:white;cursor:pointer;">Excluir</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═════════════════════════════════════════════════════════════════ -->
<div id="toast">
  <span id="toastIcon" style="width:.55rem;height:.55rem;border-radius:50%;background:#22c55e;flex-shrink:0;"></span>
  <span id="toastMsg" style="font-size:.8rem;font-weight:600;color:#1e293b;"></span>
</div>

<script>
const SUPABASE_URL = 'https://ovciyobdpcawghdynqiw.supabase.co'
const SUPABASE_KEY = 'sb_publishable_cYFH5HvS-KKiMehCSHFOUg_7MX7e0s7'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// ── State ───────────────────────────────────────────────────────────────────
let D = {}, MES = null, TAB = 'exec', MESES_LIST = []
let COMPANY = 'all', TIME = 'atual', GESTAO_SUB = 'contratos'
let ROT_PAUSED = false, rotTimer = null, rotSec = 30, rotIdx = 0
const ROT_SEQ = ['all','4Seniors','S4SYS','Porto Virtual']
const ROT_LABELS = {all:'Todas as Empresas','4Seniors':'4Seniors','S4SYS':'S4SYS','Porto Virtual':'Porto Virtual'}
const TABS = ['exec','prod','custo','cli','sla','eq','trend','ingest','gestao']
const custo = {N1:6000,N2:9000,N3:14000,'Gestão':20000,'LGPD':15000}

// ── Utils ───────────────────────────────────────────────────────────────────
const minToHM = m => { m=+m||0; return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}` }
const pct = (a,b) => b ? Math.round(a/b*100) : 0
const fmt = n => n==null ? '—' : (+n).toLocaleString('pt-BR')
const fmtR = n => n==null ? '—' : 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})
const severity = {baixa:'badge-b',media:'badge-y',alta:'badge-o',critica:'badge-r'}

function matchesCompany(nome) {
  if (COMPANY === 'all') return true
  const n = (nome||'').toLowerCase()
  if (COMPANY === '4Seniors') return n.includes('4seniors')||n.includes('4 seniors')||n.includes('seniors brasil')
  if (COMPANY === 'S4SYS') return n.includes('smart 4')||n.includes('s4sys')
  if (COMPANY === 'Porto Virtual') return n.includes('porto virtual')
  return true
}

// ── LocalStorage helpers ────────────────────────────────────────────────────
const lsGet = k => { try { return JSON.parse(localStorage.getItem(k)||'null') } catch { return null } }
const lsSet = (k,v) => localStorage.setItem(k,JSON.stringify(v))
const getContractStatus = () => lsGet('sbi_cs') || {}
const setContractStatus = v => lsSet('sbi_cs',v)
const getFuncOv = () => lsGet('sbi_fo') || {}
const setFuncOv = v => lsSet('sbi_fo',v)

// ── Toast ───────────────────────────────────────────────────────────────────
let _toastT = null
function toast(msg, ok=true) {
  document.getElementById('toastMsg').textContent = msg
  document.getElementById('toastIcon').style.background = ok ? '#22c55e' : '#ef4444'
  const t = document.getElementById('toast')
  t.classList.add('show'); clearTimeout(_toastT)
  _toastT = setTimeout(() => t.classList.remove('show'), 3200)
}

// ── Modals ──────────────────────────────────────────────────────────────────
const closeModal = id => { document.getElementById(id).classList.add('hidden'); lucide.createIcons() }
const openModal  = id => { document.getElementById(id).classList.remove('hidden'); lucide.createIcons() }

function confirmAction(msg, fn) {
  document.getElementById('confirmMsg').textContent = msg
  document.getElementById('confirmOk').onclick = () => { closeModal('modalConfirm'); fn() }
  openModal('modalConfirm')
}

// ── Rotating filter ─────────────────────────────────────────────────────────
function startRot() { clearInterval(rotTimer); rotTimer = setInterval(tickRot, 1000) }

function tickRot() {
  if (ROT_PAUSED) return
  rotSec--
  if (rotSec <= 0) { rotIdx=(rotIdx+1)%ROT_SEQ.length; applyCompany(ROT_SEQ[rotIdx]); rotSec=30 }
  document.getElementById('rotCount').textContent = rotSec+'s'
  document.getElementById('rotProgress').style.width = (rotSec/30*100)+'%'
}

function selectCompany(c) {
  rotIdx = Math.max(0, ROT_SEQ.indexOf(c))
  rotSec = 30
  document.getElementById('rotCount').textContent = '30s'
  document.getElementById('rotProgress').style.width = '100%'
  applyCompany(c)
}

function applyCompany(c) {
  COMPANY = c
  document.getElementById('cbAll').classList.toggle('active', c==='all')
  document.getElementById('cb4S').classList.toggle('active', c==='4Seniors')
  document.getElementById('cbS4').classList.toggle('active', c==='S4SYS')
  document.getElementById('cbPV').classList.toggle('active', c==='Porto Virtual')
  document.getElementById('rotLabel').textContent = ROT_LABELS[c]||c
  render()
}

function toggleRot() {
  ROT_PAUSED = !ROT_PAUSED
  const icon = document.getElementById('rotIcon')
  const dot  = document.getElementById('rotDot')
  icon.setAttribute('data-lucide', ROT_PAUSED ? 'play' : 'pause')
  dot.style.animation  = ROT_PAUSED ? 'none' : 'pulse 2s infinite'
  dot.style.background = ROT_PAUSED ? '#94a3b8' : '#2B4C9B'
  lucide.createIcons()
}

// ── Time filter ─────────────────────────────────────────────────────────────
function setTime(t) {
  TIME = t
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('t-'+t)?.classList.add('active')
  document.getElementById('selMes').classList.toggle('hidden', t!=='picker')

  if (t === '12m') {
    // Vai direto para a aba de tendência
    setTabDirect('trend')
  } else if (t !== 'picker' && MESES_LIST.length) {
    MES = MESES_LIST[0].slug
    document.getElementById('selMes').value = MES
    loadMonth(MES)
  }
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadMeses() {
  const {data} = await sb.from('meses').select('slug,competencia,updated_at').order('slug',{ascending:false})
  MESES_LIST = data || []
  const sel = document.getElementById('selMes')
  sel.innerHTML = MESES_LIST.length
    ? MESES_LIST.map(m=>`<option value="${m.slug}">${m.competencia}</option>`).join('')
    : '<option value="">Sem dados</option>'
  if (MESES_LIST.length) { MES=MESES_LIST[0].slug; sel.value=MES }
}

async function loadMonth(slug) {
  if (!slug) return
  MES = slug; D = {}
  const [rec,cli,sla,sat,prem,sk,alt] = await Promise.all([
    sb.from('recursos').select('*').eq('mes_slug',slug),
    sb.from('clientes').select('*').eq('mes_slug',slug),
    sb.from('sla').select('*').eq('mes_slug',slug).maybeSingle(),
    sb.from('satisfacao').select('*').eq('mes_slug',slug).maybeSingle(),
    sb.from('premissas').select('*'),
    sb.from('skills').select('*'),
    sb.from('alertas').select('*').eq('mes_slug',slug).eq('resolvido',false)
  ])
  D.recursos  = rec.data  || []
  D.clientes  = (cli.data||[]).sort((a,b)=>b.horas_minutos-a.horas_minutos)
  D.sla=sla.data||null; D.sat=sat.data||null; D.premissas=prem.data||[]; D.skills=sk.data||[]; D.alertas=alt.data||[]
  D.totalHoras   = D.recursos.reduce((s,r)=>s+r.trab_minutos,0)
  D.totalCap     = D.recursos.reduce((s,r)=>s+r.cap_minutos,0)
  D.totalChamados= D.clientes.reduce((s,c)=>s+c.chamados,0)
  D.fte          = pct(D.totalHoras,D.totalCap)
  const m = MESES_LIST.find(x=>x.slug===slug)
  if (m) document.getElementById('lastUpdate').textContent = 'Atualizado: '+new Date(m.updated_at).toLocaleString('pt-BR')
  render()
}

// ── Filtered views ───────────────────────────────────────────────────────────
const fCli = () => COMPANY==='all' ? D.clientes : D.clientes.filter(c=>matchesCompany(c.nome))
const fRec = () => COMPANY==='all' ? D.recursos  : D.recursos.filter(r=>matchesCompany(r.nome)||matchesCompany(r.equipe))

// ── Tabs ─────────────────────────────────────────────────────────────────────
function setTabDirect(t) {
  TAB = t
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',TABS[i]===t))
  if (t==='trend'||t==='ingest') {
    ;(t==='trend'?rTrend():rIngest()).then(html=>{document.getElementById('main').innerHTML=html;lucide.createIcons()})
      .catch(e=>{document.getElementById('main').innerHTML=`<div class="card" style="color:#ef4444;">${e}</div>`})
  } else render()
}

window.setTab = setTabDirect

function render() {
  const el = document.getElementById('main')
  if (!MES||!D.recursos) { el.innerHTML='<div style="color:#94a3b8;font-size:.875rem;padding:2rem;">Selecione um mês acima.</div>'; return }
  const fn={exec:rExec,prod:rProd,custo:rCusto,cli:rCli,sla:rSLA,eq:rEquipe,gestao:rGestao}
  el.innerHTML=(fn[TAB]||rExec)()
  lucide.createIcons()
}

// ── HELPERS de UI ────────────────────────────────────────────────────────────
const kpiCard = (val,lbl,col,icon) => `
  <div class="card" style="border-left:3px solid ${col};">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="kpi-lbl">${lbl}</div>
        <div class="kpi-big" style="color:${col};margin-top:.15rem;">${val}</div>
      </div>
      <div style="background:${col}18;border-radius:.5rem;padding:.45rem;color:${col};flex-shrink:0;">
        <i data-lucide="${icon}" style="width:1rem;height:1rem;"></i>
      </div>
    </div>
  </div>`

const sectionTitle = t => `<div style="font-size:.67rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;">${t}</div>`

// ── ABA: EXECUTIVO ────────────────────────────────────────────────────────────
function rExec() {
  const clis = fCli()
  const totH  = clis.reduce((s,c)=>s+c.horas_minutos,0)||D.totalHoras
  const totCh = clis.reduce((s,c)=>s+c.chamados,0)||D.totalChamados
  const fte   = D.fte
  const csat  = D.sat?.csat ?? null
  const fteC  = fte<60?'#ef4444':fte<80?'#f59e0b':'#22c55e'
  const csatC = csat==null?'#94a3b8':csat>=85?'#22c55e':csat>=70?'#f59e0b':'#ef4444'

  const alertPanel = D.alertas.length
    ? D.alertas.slice(0,5).map(a=>`
      <div style="display:flex;align-items:flex-start;gap:.65rem;padding:.65rem;border-radius:.5rem;background:#f8fafc;border:1px solid #f1f5f9;">
        <span class="badge ${severity[a.severidade]||'badge-b'}" style="flex-shrink:0;margin-top:.1rem;">${a.tipo}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:.82rem;font-weight:600;">${a.titulo||''}</div>
          <div style="font-size:.73rem;color:#64748b;margin-top:.1rem;">${a.descricao||''}</div>
        </div>
        <button onclick="dismissAlerta('${a.id}')" style="background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:.8rem;flex-shrink:0;">✕</button>
      </div>`).join('')
    : `<div style="color:#94a3b8;font-size:.82rem;padding:.75rem;text-align:center;">Sem alertas ativos</div>`

  const topCli = clis.slice(0,6).map(c=>{
    const prem=D.premissas.find(p=>p.cliente===c.nome); const fran=prem?.franquia_horas||0
    const h=Math.round(c.horas_minutos/60); const uso=fran?pct(h,fran):null
    const cor=uso!=null?(uso>110?'#ef4444':uso>90?'#f59e0b':'#2B4C9B'):'#2B4C9B'
    const w=Math.min(uso??pct(c.horas_minutos,totH/100+1),100)
    return `<div>
      <div style="display:flex;justify-content:space-between;font-size:.73rem;margin-bottom:.3rem;">
        <span style="font-weight:600;color:#1e293b;">${c.nome}</span>
        <span style="color:#64748b;">${minToHM(c.horas_minutos)}h${fran?' / '+fran+'h':''}</span>
      </div>
      <div style="width:100%;height:.35rem;background:#f1f5f9;border-radius:9999px;overflow:hidden;">
        <div style="height:100%;background:${cor};width:${w}%;transition:width .6s;"></div>
      </div>
    </div>`
  }).join('')

  return `
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
    ${kpiCard(minToHM(totH)+'h','Horas produtivas','#2B4C9B','clock')}
    ${kpiCard(fte+'%','Utilização FTE',fteC,'activity')}
    ${kpiCard(fmt(totCh),'Chamados','#E04622','ticket')}
    ${kpiCard(csat!=null?csat+'%':'—','CSAT',csatC,'star')}
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <div class="card">
      ${sectionTitle(`Alertas ativos (${D.alertas.length})`)}
      <div style="display:flex;flex-direction:column;gap:.4rem;">${alertPanel}</div>
    </div>
    <div class="card">
      ${sectionTitle('Top clientes — horas')}
      <div style="display:flex;flex-direction:column;gap:.7rem;">${topCli||'<div style="color:#94a3b8;font-size:.82rem;">Nenhum cliente neste filtro.</div>'}</div>
    </div>
  </div>`
}

// ── ABA: PRODUTIVIDADE ────────────────────────────────────────────────────────
function rProd() {
  const recs = fRec()
  const rows = recs.map(r=>{
    const fte=pct(r.trab_minutos,r.cap_minutos)
    const cor=fte<60?'#ef4444':fte<80?'#f59e0b':'#22c55e'
    return `<tr>
      <td style="font-weight:600;">${r.nome}</td>
      <td><span class="tag">${r.nivel}</span></td>
      <td style="color:#64748b;">${r.equipe||'—'}</td>
      <td>${minToHM(r.trab_minutos)}h</td>
      <td style="color:#94a3b8;">${minToHM(r.avulsa_minutos)}h</td>
      <td style="color:${cor};font-weight:800;">${fte}%</td>
    </tr>`
  }).join('')
  return `<div class="card overflow-x-auto">
    ${sectionTitle('Produtividade por Técnico')}
    <table><thead><tr><th>Técnico</th><th>Nível</th><th>Equipe</th><th>H. Trabalhadas</th><th>H. Avulsas</th><th>FTE %</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="color:#94a3b8;padding:1.5rem;text-align:center;">Nenhum técnico neste filtro.</td></tr>'}</tbody></table>
  </div>`
}

// ── ABA: CUSTOS & MARGEM ──────────────────────────────────────────────────────
function rCusto() {
  let totalCusto=0
  const recs=fRec()
  const techRows=recs.map(r=>{
    const c=custo[r.nivel]||8000; totalCusto+=c
    const chh=(r.trab_minutos/60)>0?c/(r.trab_minutos/60):0
    return `<tr>
      <td style="font-weight:600;">${r.nome}</td>
      <td><span class="tag">${r.nivel}</span></td>
      <td>${minToHM(r.trab_minutos)}h</td>
      <td style="color:#854d0e;font-weight:700;">${fmtR(c)} <span style="font-size:.65rem;color:#94a3b8;font-weight:400;">(est.)</span></td>
      <td style="color:#94a3b8;">${fmtR(Math.round(chh))}/h</td>
    </tr>`
  }).join('')
  const clis=fCli(); let totalRec=0
  const cliRows=clis.map(c=>{
    const p=D.premissas.find(x=>x.cliente===c.nome); const val=p?.valor_mensal||0; totalRec+=val
    const alloc=totalCusto>0&&D.totalHoras>0?(c.horas_minutos/D.totalHoras)*totalCusto:0
    const mg=val&&alloc?pct(val-alloc,val):null
    const mc=mg==null?'#94a3b8':mg<0?'#ef4444':mg<20?'#f59e0b':'#22c55e'
    return `<tr>
      <td style="font-weight:600;">${c.nome}</td><td>${minToHM(c.horas_minutos)}h</td>
      <td>${fmt(c.chamados)}</td>
      <td style="color:#166534;font-weight:600;">${val?fmtR(val):`<span style="color:#94a3b8">(a def.)</span>`}</td>
      <td style="color:${mc};font-weight:800;">${mg!=null?mg+'%':'—'}</td>
    </tr>`
  }).join('')
  return `
  <div class="grid grid-cols-2 gap-4 mb-5">
    ${kpiCard(fmtR(totalCusto),'Custo equipe (est.)','#854d0e','users')}
    ${kpiCard(totalRec?fmtR(totalRec):'(a definir)','Receita contratos (est.)','#166534','dollar-sign')}
  </div>
  <div class="card mb-4 overflow-x-auto">
    ${sectionTitle('Custo por Técnico')}
    <table><thead><tr><th>Técnico</th><th>Nível</th><th>H. Trab.</th><th>Custo/mês</th><th>Custo/h</th></tr></thead><tbody>${techRows}</tbody></table>
    <div style="font-size:.67rem;color:#94a3b8;margin-top:.5rem;">* Valores estimados — atualize salários reais em Gestão → Funcionários.</div>
  </div>
  <div class="card overflow-x-auto">
    ${sectionTitle('Margem por Cliente')}
    <table><thead><tr><th>Cliente</th><th>Horas</th><th>Chamados</th><th>Receita</th><th>Margem est.</th></tr></thead><tbody>${cliRows}</tbody></table>
  </div>`
}

// ── ABA: CLIENTES ─────────────────────────────────────────────────────────────
function rCli() {
  const clis=fCli()
  const rows=clis.map(c=>{
    const p=D.premissas.find(x=>x.cliente===c.nome); const fran=p?.franquia_horas||0
    const h=c.horas_minutos/60; const uso=fran?pct(Math.round(h),fran):null
    const cor=uso==null?'#64748b':uso>110?'#ef4444':uso>90?'#f59e0b':'#22c55e'
    return `<tr>
      <td style="font-weight:600;">${c.nome}</td>
      <td>${minToHM(c.horas_minutos)}h</td>
      <td style="color:#64748b;">${fran||'—'}h</td>
      <td style="color:${cor};font-weight:800;">${uso!=null?uso+'%':'—'}</td>
      <td>${fmt(c.chamados)}</td>
    </tr>`
  }).join('')
  return `<div class="card overflow-x-auto">
    ${sectionTitle('Clientes — Horas vs Franquia')}
    <table><thead><tr><th>Cliente</th><th>H. Real</th><th>Franquia</th><th>Uso %</th><th>Chamados</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" style="color:#94a3b8;padding:1.5rem;text-align:center;">Nenhum cliente neste filtro.</td></tr>'}</tbody></table>
  </div>`
}

// ── ABA: SLA ──────────────────────────────────────────────────────────────────
function rSLA() {
  if (!D.sla) return `<div class="card" style="color:#94a3b8;font-size:.875rem;padding:2rem;text-align:center;">SLA não carregado para este mês.</div>`
  const s=D.sla; const slC=s.dentro_sla_pct>=90?'#22c55e':s.dentro_sla_pct>=75?'#f59e0b':'#ef4444'
  return `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    ${kpiCard(minToHM(s.tma_minutos)+'h','TMA (Tempo Médio Atend.)','#2B4C9B','clock')}
    ${kpiCard(minToHM(s.tmr_minutos)+'h','TMR (Tempo Médio Resolução)','#E04622','timer')}
    ${kpiCard(s.dentro_sla_pct+'%','Dentro do SLA',slC,'shield-check')}
    ${kpiCard(fmt(s.chamados_fora),'Chamados fora do SLA','#ef4444','shield-alert')}
  </div>`

// ── ABA: EQUIPE ───────────────────────────────────────────────────────────────
function rEquipe() {
  if (!D.skills.length) return `<div class="card" style="color:#94a3b8;font-size:.875rem;padding:2rem;text-align:center;">Matriz de skills não carregada.</div>`
  const tecnicos=[...new Set(D.skills.map(s=>s.tecnico))]
  const skills=[...new Set(D.skills.map(s=>s.skill))]
  const bg={1:'#dbeafe',2:'#fef9c3',3:'#dcfce7'}; const tx={1:'#1e40af',2:'#854d0e',3:'#166534'}
  const spofs=skills.filter(sk=>D.skills.filter(s=>s.skill===sk&&s.nivel===3).length<2)
  const header=tecnicos.map(t=>`<th style="text-align:center;min-width:2.5rem;">${t.split(' ')[0]}</th>`).join('')
  const rows=skills.map(sk=>{
    const cells=tecnicos.map(t=>{
      const e=D.skills.find(s=>s.tecnico===t&&s.skill===sk); const n=e?.nivel||0
      return `<td style="text-align:center;"><div class="hcell mx-auto" style="background:${n?bg[n]:'#f8fafc'};color:${n?tx[n]:'#cbd5e1'};">${n||''}</div></td>`
    }).join('')
    const isSpof=spofs.includes(sk)
    return `<tr><td style="font-size:.8rem;padding-right:.75rem;white-space:nowrap;font-weight:${isSpof?700:400};">${sk} ${isSpof?'<span class="spof-badge">SPOF</span>':''}</td>${cells}</tr>`
  }).join('')
  return `
  <div class="card overflow-x-auto mb-4">
    ${sectionTitle('Matriz de Conhecimento — 1 básico · 2 pleno · 3 especialista')}
    <table><thead><tr><th>Skill</th>${header}</tr></thead><tbody>${rows}</tbody></table>
  </div>
  ${spofs.length?`<div class="card" style="border-left:3px solid #ef4444;">
    <div style="font-size:.67rem;font-weight:800;color:#ef4444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;">Riscos SPOF — Single Point of Failure</div>
    <div style="display:flex;flex-wrap:wrap;gap:.4rem;">${spofs.map(s=>`<span class="badge badge-r">${s}</span>`).join('')}</div>
  </div>`:''}`
}

// ── ABA: TENDÊNCIA ────────────────────────────────────────────────────────────
async function rTrend() {
  const {data}=await sb.from('meses').select('slug,competencia,total_chamados').order('slug')
  if (!data?.length) return `<div class="card" style="color:#94a3b8;font-size:.875rem;padding:2rem;text-align:center;">Dados insuficientes para tendência.</div>`
  const {data:recs}=await sb.from('recursos').select('mes_slug,trab_minutos,cap_minutos').in('mes_slug',data.map(m=>m.slug))
  const rows=data.map(m=>{
    const r=(recs||[]).filter(x=>x.mes_slug===m.slug)
    const trab=r.reduce((s,x)=>s+x.trab_minutos,0); const cap=r.reduce((s,x)=>s+x.cap_minutos,0)
    const fte=pct(trab,cap); const cor=fte<60?'#ef4444':fte<80?'#f59e0b':'#22c55e'
    return `<tr>
      <td style="font-weight:600;">${m.competencia}</td>
      <td>${minToHM(trab)}h</td><td>${fmt(m.total_chamados)}</td>
      <td style="color:${cor};font-weight:800;">${fte}%</td>
    </tr>`
  }).join('')
  return `<div class="card overflow-x-auto">
    ${sectionTitle('Série Histórica')}
    <table><thead><tr><th>Mês</th><th>Horas</th><th>Chamados</th><th>FTE %</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`
}

// ── ABA: INGESTÃO ─────────────────────────────────────────────────────────────
async function rIngest() {
  const {data}=await sb.from('ingest_log').select('*').order('created_at',{ascending:false}).limit(30)
  const {data:mList}=await sb.from('meses').select('slug,competencia,updated_at').order('slug',{ascending:false})
  const mRows=(mList||[]).map(m=>`<tr>
    <td style="font-weight:600;">${m.competencia}</td>
    <td style="font-family:monospace;font-size:.72rem;color:#64748b;">${m.slug}</td>
    <td style="font-size:.72rem;color:#94a3b8;">${new Date(m.updated_at).toLocaleString('pt-BR')}</td>
  </tr>`).join('')
  const logRows=(data||[]).length?(data||[]).map(l=>{
    const cor=l.status==='processado'?'badge-g':l.status==='erro'?'badge-r':'badge-y'
    return `<tr>
      <td style="font-family:monospace;font-size:.7rem;color:#64748b;">${new Date(l.created_at).toLocaleString('pt-BR')}</td>
      <td style="font-size:.75rem;max-width:15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.arquivo?.split('\\').pop()||l.arquivo}</td>
      <td><span class="badge ${cor}">${l.status}</span></td>
      <td style="font-size:.73rem;color:#94a3b8;">${l.tipo||'—'}</td>
    </tr>`
  }).join(''):`<tr><td colspan="4" style="color:#94a3b8;font-size:.82rem;padding:1.5rem;text-align:center;">Nenhum arquivo ingerido ainda.</td></tr>`
  return `
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <div class="card"><div style="font-size:.67rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;">Meses no banco</div>
      <table><thead><tr><th>Competência</th><th>Slug</th><th>Atualizado</th></tr></thead><tbody>${mRows}</tbody></table></div>
    <div class="card"><div style="font-size:.67rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;">Log de ingestão (últimos 30)</div>
      <div class="overflow-x-auto"><table><thead><tr><th>Data</th><th>Arquivo</th><th>Status</th><th>Tipo</th></tr></thead><tbody>${logRows}</tbody></table></div></div>
  </div>
  <div class="card mt-4" style="border-left:3px solid var(--brand);">
    <div style="font-size:.75rem;font-weight:700;color:var(--brand);margin-bottom:.5rem;">Como adicionar dados</div>
    <ol style="font-size:.8rem;color:#64748b;padding-left:1.25rem;display:flex;flex-direction:column;gap:.25rem;line-height:1.5;">
      <li>Salve PDFs do Milldesk em <code style="background:#f1f5f9;padding:.1rem .3rem;border-radius:.25rem;font-size:.72rem;">Base/[mês]/</code> no OneDrive</li>
      <li>O <code style="background:#f1f5f9;padding:.1rem .3rem;border-radius:.25rem;font-size:.72rem;">watch.ps1</code> detecta e registra aqui automaticamente</li>
      <li>Abra o Claude Code → PDFs são processados → <code style="background:#f1f5f9;padding:.1rem .3rem;border-radius:.25rem;font-size:.72rem;">push-mes.ps1</code> é executado</li>
      <li>Dashboard atualiza em tempo real via Supabase Realtime</li>
    </ol>
  </div>`
}

// ── ABA: GESTÃO ───────────────────────────────────────────────────────────────
function rGestao() {
  const subNav=`<div style="display:flex;gap:.2rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:.5rem;padding:.15rem;width:fit-content;margin-bottom:1.25rem;">
    <button class="sub-tab ${GESTAO_SUB==='contratos'?'active':''}" onclick="setGSub('contratos')">Contratos</button>
    <button class="sub-tab ${GESTAO_SUB==='funcionarios'?'active':''}" onclick="setGSub('funcionarios')">Funcionários</button>
  </div>`
  return subNav + (GESTAO_SUB==='contratos'?rContratos():rFuncionarios())
}

window.setGSub = function(sub) { GESTAO_SUB=sub; render() }

function rContratos() {
  const st=getContractStatus()
  const sBadge=s=>s==='ativo'?'badge-g':s==='pausado'?'badge-y':'badge-r'
  const rows=(D.premissas||[]).map(p=>{
    const s=st[p.cliente]||'ativo'
    return `<tr>
      <td style="font-weight:600;">${p.cliente}</td>
      <td style="color:#64748b;">${p.franquia_horas||'—'}h</td>
      <td style="color:#166534;font-weight:700;">${p.valor_mensal?fmtR(p.valor_mensal):'—'}</td>
      <td><span class="badge ${sBadge(s)}">${s}</span></td>
      <td style="display:flex;gap:.2rem;align-items:center;">
        <button class="act-btn act-edit" onclick="openContractEdit('${p.cliente.replace(/'/g,"\\'")}')">Editar</button>
        <button class="act-btn act-arch" onclick="archiveContract('${p.cliente.replace(/'/g,"\\'")}')">Arquivar</button>
        <button class="act-btn act-del" onclick="deleteContract('${p.cliente.replace(/'/g,"\\'")}')">✕</button>
      </td>
    </tr>`
  }).join('')
  return `<div class="card overflow-x-auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;">
      ${sectionTitle('Contratos / Premissas')}
      <button onclick="openContractNew()" style="display:flex;align-items:center;gap:.35rem;background:var(--brand);color:white;border:none;border-radius:.5rem;padding:.4rem .85rem;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:-.4rem;">
        <i data-lucide="plus" style="width:.8rem;height:.8rem;"></i> Novo Contrato
      </button>
    </div>
    <table><thead><tr><th>Cliente</th><th>Franquia</th><th>Valor Mensal</th><th>Status</th><th>Ações</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" style="color:#94a3b8;padding:1.5rem;text-align:center;">Nenhum contrato cadastrado.</td></tr>'}</tbody></table>
  </div>`
}

function rFuncionarios() {
  const ov=getFuncOv()
  const names=[...new Set(D.recursos.map(r=>r.nome))].filter(n=>!ov[n]?._removed)
  const funcs=names.map(nome=>{
    const last=D.recursos.filter(r=>r.nome===nome).sort((a,b)=>b.mes_slug.localeCompare(a.mes_slug))[0]
    const o=ov[nome]||{}
    return {nome, nivel:o.nivel||last?.nivel||'—', equipe:o.equipe||last?.equipe||'—', cap:o.cap||(last?.cap_minutos?Math.round(last.cap_minutos/60):0)}
  })
  const rows=funcs.map(f=>`<tr>
    <td style="font-weight:600;">${f.nome}</td>
    <td><span class="tag">${f.nivel}</span></td>
    <td style="color:#64748b;">${f.equipe}</td>
    <td style="color:#64748b;">${f.cap}h/mês</td>
    <td style="display:flex;gap:.2rem;align-items:center;">
      <button class="act-btn act-edit" onclick="openFuncEdit('${f.nome.replace(/'/g,"\\'")}')">Editar</button>
      <button class="act-btn act-del" onclick="removeFunc('${f.nome.replace(/'/g,"\\'")}')">✕</button>
    </td>
  </tr>`).join('')
  return `
  <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:.5rem;padding:.6rem .875rem;margin-bottom:1rem;font-size:.78rem;color:#854d0e;line-height:1.45;">
    <strong>Atenção:</strong> Edições não alteram registros históricos de horas. Novos valores aplicam-se apenas a cálculos futuros.
  </div>
  <div class="card overflow-x-auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;">
      ${sectionTitle('Funcionários Ativos')}
      <button onclick="openFuncNew()" style="display:flex;align-items:center;gap:.35rem;background:var(--brand);color:white;border:none;border-radius:.5rem;padding:.4rem .85rem;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:-.4rem;">
        <i data-lucide="plus" style="width:.8rem;height:.8rem;"></i> Novo Funcionário
      </button>
    </div>
    <table><thead><tr><th>Nome</th><th>Nível</th><th>Equipe</th><th>Capacidade</th><th>Ações</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" style="color:#94a3b8;padding:1.5rem;text-align:center;">Nenhum funcionário encontrado.</td></tr>'}</tbody></table>
  </div>`
}

// ── CRUD: Contratos ───────────────────────────────────────────────────────────
function openContractNew() {
  document.getElementById('mCTitle').textContent='Novo Contrato'
  document.getElementById('cOld').value=''
  document.getElementById('cCliente').value=''
  document.getElementById('cFranquia').value=''
  document.getElementById('cValor').value=''
  document.getElementById('cStatus').value='ativo'
  openModal('modalContract')
}

function openContractEdit(cliente) {
  const p=D.premissas.find(x=>x.cliente===cliente); if(!p) return
  document.getElementById('mCTitle').textContent='Editar Contrato'
  document.getElementById('cOld').value=cliente
  document.getElementById('cCliente').value=p.cliente
  document.getElementById('cFranquia').value=p.franquia_horas||''
  document.getElementById('cValor').value=p.valor_mensal||''
  document.getElementById('cStatus').value=getContractStatus()[cliente]||'ativo'
  openModal('modalContract')
}

async function saveContract(e) {
  e.preventDefault()
  const old=document.getElementById('cOld').value
  const cliente=document.getElementById('cCliente').value.trim()
  const franquia=parseInt(document.getElementById('cFranquia').value)||0
  const valor=parseFloat(document.getElementById('cValor').value)||0
  const status=document.getElementById('cStatus').value
  try {
    if (old && old!==cliente) await sb.from('premissas').delete().eq('cliente',old)
    await sb.from('premissas').upsert({cliente,franquia_horas:franquia,valor_mensal:valor},{onConflict:'cliente'})
    const st=getContractStatus(); st[cliente]=status; if(old&&old!==cliente) delete st[old]; setContractStatus(st)
    closeModal('modalContract')
    await loadMonth(MES)
    toast('Contrato salvo com sucesso!')
  } catch(err) { toast('Erro: '+err.message, false) }
}

function archiveContract(cliente) {
  const st=getContractStatus(); st[cliente]='arquivado'; setContractStatus(st)
  render(); toast('Contrato arquivado.')
}

function deleteContract(cliente) {
  confirmAction(`Remover o contrato de "${cliente}"? Esta ação não pode ser desfeita.`, async()=>{
    await sb.from('premissas').delete().eq('cliente',cliente)
    await loadMonth(MES)
    toast('Contrato removido.')
  })
}

// ── CRUD: Funcionários ────────────────────────────────────────────────────────
function openFuncNew() {
  document.getElementById('mFTitle').textContent='Novo Funcionário'
  document.getElementById('fOld').value=''
  document.getElementById('fNome').value=''
  document.getElementById('fNivel').value='N1'
  document.getElementById('fEquipe').value=''
  document.getElementById('fCap').value='168'
  openModal('modalFunc')
}

function openFuncEdit(nome) {
  const ov=getFuncOv()
  const rec=D.recursos.filter(r=>r.nome===nome).sort((a,b)=>b.mes_slug.localeCompare(a.mes_slug))[0]
  const o={...rec,...(ov[nome]||{})}
  document.getElementById('mFTitle').textContent='Editar Funcionário'
  document.getElementById('fOld').value=nome
  document.getElementById('fNome').value=nome
  document.getElementById('fNivel').value=o.nivel||'N1'
  document.getElementById('fEquipe').value=o.equipe||''
  document.getElementById('fCap').value=o.cap||(rec?.cap_minutos?Math.round(rec.cap_minutos/60):168)
  openModal('modalFunc')
}

function saveFunc(e) {
  e.preventDefault()
  const old=document.getElementById('fOld').value
  const nome=document.getElementById('fNome').value.trim()
  const nivel=document.getElementById('fNivel').value
  const equipe=document.getElementById('fEquipe').value.trim()
  const cap=parseInt(document.getElementById('fCap').value)||168
  const ov=getFuncOv()
  if(old&&old!==nome) delete ov[old]
  ov[nome]={nivel,equipe,cap}; setFuncOv(ov)
  closeModal('modalFunc'); render()
  toast('Funcionário atualizado. Dados históricos preservados.')
}

function removeFunc(nome) {
  confirmAction(`Remover "${nome}" da listagem futura? O histórico de horas é preservado.`, ()=>{
    const ov=getFuncOv(); ov[nome]={_removed:true}; setFuncOv(ov)
    render(); toast('Funcionário ocultado da listagem.')
  })
}

// ── Dismiss alerta ────────────────────────────────────────────────────────────
async function dismissAlerta(id) {
  await sb.from('alertas').update({resolvido:true}).eq('id',id)
  D.alertas=D.alertas.filter(a=>a.id!==id); render()
}

// ── Realtime ──────────────────────────────────────────────────────────────────
function initRealtime() {
  sb.channel('seniorsbi-live')
    .on('postgres_changes',{event:'*',schema:'public',table:'meses'},async()=>{
      await loadMeses()
      if(!MESES_LIST.find(m=>m.slug===MES)&&MESES_LIST.length){MES=MESES_LIST[0].slug;document.getElementById('selMes').value=MES}
      await loadMonth(MES)
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'recursos'},()=>loadMonth(MES))
    .on('postgres_changes',{event:'*',schema:'public',table:'clientes'},()=>loadMonth(MES))
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'ingest_log'},()=>{
      if(TAB==='ingest') rIngest().then(h=>{document.getElementById('main').innerHTML=h;lucide.createIcons()})
    })
    .subscribe(status=>{
      const dot=document.getElementById('liveDot'),lbl=document.getElementById('liveStatus')
      if(status==='SUBSCRIBED'){dot.style.background='#22c55e';lbl.textContent='Live'}
      else{dot.style.background='#f59e0b';lbl.textContent='Reconectando…'}
    })
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    await loadMeses()
    if (MES) await loadMonth(MES)
    else document.getElementById('main').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:18rem;gap:.75rem;">
        <div style="color:#94a3b8;font-size:.875rem;">Banco ainda vazio.</div>
        <div style="color:#cbd5e1;font-size:.78rem;">Rode <code style="background:#f1f5f9;padding:.1rem .4rem;border-radius:.25rem;">push-mes.ps1 -Slug 2026-06</code> para carregar os dados.</div>
      </div>`
    initRealtime(); startRot()
  } catch(e) {
    document.getElementById('main').innerHTML=`<div class="card" style="border-left:3px solid #ef4444;color:#ef4444;font-size:.875rem;padding:1.25rem;">Erro ao conectar no Supabase: ${e.message}</div>`
  } finally {
    document.getElementById('loading').style.display='none'
    document.getElementById('app').classList.remove('hidden')
    lucide.createIcons()
  }
}

document.getElementById('selMes').addEventListener('change',e=>{ if(e.target.value) loadMonth(e.target.value) })

boot()
</script>
</body>
