<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeniorsBI — Painel de Operações</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--brand:#2B4C9B;--accent:#E04622;--bg:#f0f4fa;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--subtle:#94a3b8}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
/* Fallback de utilidades (caso o CDN Tailwind não carregue) */
.grid{display:grid}.flex{display:flex}.flex-col{flex-direction:column}.flex-1{flex:1 1 0%}.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.text-center{text-align:center}.mx-auto{margin-left:auto;margin-right:auto}.w-full{width:100%}.min-h-screen{min-height:100vh}
.overflow-auto{overflow:auto}.overflow-x-auto{overflow-x:auto}
.p-4{padding:1rem}.px-4{padding-left:1rem;padding-right:1rem}.py-1\.5{padding-top:.375rem;padding-bottom:.375rem}
.mb-2{margin-bottom:.5rem}.mb-2\.5{margin-bottom:.625rem}.mb-4{margin-bottom:1rem}.mt-3{margin-top:.75rem}
.gap-1{gap:.25rem}.gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-2\.5{gap:.625rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}
.space-y-3>*+*{margin-top:.75rem}
.grid-cols-1{grid-template-columns:repeat(1,minmax(0,1fr))}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}.grid-cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}
@media(min-width:768px){.md\:grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.md\:grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.md\:grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.md\:grid-cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}}
@media(min-width:1024px){.lg\:grid-cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}}
@media(min-width:1280px){.xl\:grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.card{background:var(--card);border-radius:.875rem;padding:1.25rem;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.kpi-big{font-size:1.7rem;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.02em}
.kpi-lbl{font-size:.62rem;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:.15rem}
.sec-btn{padding:.4rem 1rem;border-radius:.45rem;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:transparent;white-space:nowrap}
.sec-btn.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(43,76,155,.25)}
.sec-btn:hover:not(.active){background:#f1f5f9;color:var(--text)}
.sub-tab{padding:.27rem .78rem;border-radius:.37rem;font-size:.73rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:transparent;white-space:nowrap}
.sub-tab.active{background:var(--brand);color:#fff}
.sub-tab:hover:not(.active){background:#e2e8f0;color:var(--text)}
.comp-btn{padding:.27rem .68rem;border-radius:.42rem;font-size:.7rem;font-weight:700;border:1px solid var(--border);background:white;color:var(--muted);cursor:pointer;transition:all .15s}
.comp-btn.active{background:var(--brand);border-color:var(--brand);color:white;box-shadow:0 2px 6px rgba(43,76,155,.2)}
.time-btn{padding:.22rem .53rem;border-radius:.37rem;font-size:.7rem;font-weight:600;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.time-btn.active{background:var(--brand);color:white}
.badge{display:inline-flex;align-items:center;padding:.1rem .38rem;border-radius:9999px;font-size:.63rem;font-weight:700}
.badge-g{background:#dcfce7;color:#166534}.badge-y{background:#fef9c3;color:#854d0e}.badge-r{background:#fee2e2;color:#991b1b}
.badge-b{background:#dbeafe;color:#1e40af}.badge-p{background:#ede9fe;color:#6d28d9}
.tag{display:inline-block;padding:.08rem .3rem;border-radius:.22rem;font-size:.62rem;background:#f1f5f9;border:1px solid var(--border);color:var(--muted);font-weight:500}
.tech-tag{display:inline-block;padding:.08rem .3rem;border-radius:.22rem;font-size:.61rem;background:#ede9fe;border:1px solid #ddd6fe;color:#6d28d9;font-weight:600;margin:.08rem .07rem 0 0}
.hcell{width:1.8rem;height:1.8rem;border-radius:.27rem;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800}
.pulse{width:.47rem;height:.47rem;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#loading{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:99;flex-direction:column;gap:1rem}
.spinner{width:2rem;height:2rem;border:3px solid #e2e8f0;border-top-color:var(--brand);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:.38rem .6rem;font-size:.6rem;color:var(--subtle);border-bottom:2px solid var(--border);white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
td{padding:.43rem .6rem;font-size:.75rem;border-bottom:1px solid #f1f5f9;color:var(--text);vertical-align:middle}
tr:last-child td{border:none}tr:hover td{background:#fafbfd}
.modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:white;border-radius:1rem;max-width:32rem;width:100%;padding:1.5rem;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.18)}
.fi{background:#f8fafc;border:1px solid var(--border);border-radius:.5rem;padding:.47rem .67rem;font-size:.81rem;color:var(--text);width:100%;outline:none;font-family:inherit}
.fi:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(43,76,155,.08)}
textarea.fi{resize:vertical;min-height:2.7rem}
.fl{display:block;font-size:.63rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.21rem}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:70;background:white;border:1px solid var(--border);border-radius:.875rem;padding:.6rem 1.1rem;box-shadow:0 12px 40px rgba(0,0,0,.12);display:flex;align-items:center;gap:.6rem;transform:translateY(120px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
.logo-pill{background:white;border:1px solid var(--border);border-radius:.43rem;padding:.2rem .46rem;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center}
.act-btn{background:none;border:none;cursor:pointer;font-size:.67rem;font-weight:600;padding:.15rem .33rem;border-radius:.24rem;transition:all .12s}
.act-edit{color:var(--brand)}.act-edit:hover{background:#dbeafe}
.act-del{color:#ef4444}.act-del:hover{background:#fee2e2}
.act-arch{color:var(--subtle)}.act-arch:hover{background:#f1f5f9}
.alrt-c{border-radius:.43rem;padding:.5rem .73rem;display:flex;align-items:flex-start;gap:.53rem;border-left:3px solid}
.emp-4s{font-weight:800;font-size:.66rem;background:#dbeafe;color:#1e40af;padding:.08rem .3rem;border-radius:.2rem}
.emp-s4{font-weight:800;font-size:.66rem;background:#ede9fe;color:#6d28d9;padding:.08rem .3rem;border-radius:.2rem}
.emp-pv{font-weight:800;font-size:.66rem;background:#dcfce7;color:#166534;padding:.08rem .3rem;border-radius:.2rem}
</style>
</head>
<body>
<div id="loading"><svg width="48" height="36" viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg"><ellipse cx="40" cy="28" rx="38" ry="24" fill="#2B4C9B" stroke="#E04622" stroke-width="3"/><text x="40" y="27" text-anchor="middle" font-size="19" font-weight="900" fill="#fff" font-family="Arial Black,Arial">4</text><text x="40" y="40" text-anchor="middle" font-size="9" font-weight="700" fill="#93c5fd" font-family="Arial">SENIORS</text></svg><div class="spinner"></div></div>

<div id="app" class="hidden min-h-screen flex flex-col">

<header style="background:white;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:40;" class="px-4 py-1.5">
  <div class="flex items-center justify-between gap-3">
    <div class="flex items-center gap-2">
      <div class="logo-pill"><img src="4sr.png" alt="4Seniors" style="height:25px;width:auto;object-fit:contain;display:block;"></div>
      <div class="logo-pill"><img src="s4sys.jpg" alt="S4SYS" style="height:25px;width:auto;object-fit:contain;display:block;"></div>
      <div class="logo-pill"><img src="portovirtual.png" alt="Porto Virtual" style="height:25px;width:auto;object-fit:contain;display:block;"></div>
      <div style="border-left:2px solid #e2e8f0;padding-left:.68rem;"><div style="font-size:.92rem;font-weight:900;color:#1e293b;letter-spacing:-.03em;line-height:1.1">SeniorsBI</div><div style="font-size:.57rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.09em;">Painel de Operações</div></div>
    </div>
    <div class="flex items-center gap-2.5">
      <div style="display:flex;gap:.16rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:.52rem;padding:.16rem;">
        <button class="sec-btn active" onclick="setSection('exec')" id="sb-exec">Executiva</button>
        <button class="sec-btn" onclick="setSection('tech')" id="sb-tech">Técnica</button>
        <button class="sec-btn" onclick="setSection('admin')" id="sb-admin">Admin</button>
      </div>
      <div style="width:1px;height:1.25rem;background:#e2e8f0;"></div>
      <div class="flex items-center gap-1.5"><div class="pulse" id="liveDot"></div><span style="font-size:.68rem;color:#64748b;" id="liveStatus">…</span><span id="zbxStatus" style="font-size:.62rem;font-weight:700;"></span><span id="appVersion" style="font-size:.62rem;font-weight:800;background:#eef2ff;color:#2B4C9B;border:1px solid #dbeafe;padding:.05rem .32rem;border-radius:.3rem;"></span></div>
      <span style="font-size:.58rem;color:#94a3b8;" id="lastUpdate"></span>
    </div>
  </div>
</header>

<div style="background:white;border-bottom:1px solid #e2e8f0;padding:.26rem 1.1rem;display:flex;gap:.1rem;overflow-x:auto;" id="subTabs"></div>

<div style="background:#fafbfc;border-bottom:1px solid #e2e8f0;padding:.32rem 1.1rem;">
  <div class="flex items-center gap-2.5 flex-wrap">
    <div class="flex items-center gap-1.5">
      <div id="rotDot" style="width:.44rem;height:.44rem;border-radius:50%;background:#2B4C9B;animation:pulse 2s infinite;flex-shrink:0;"></div>
      <span id="rotLabel" style="font-size:.73rem;font-weight:800;color:#1e293b;">Todas</span>
      <span id="rotCount" style="font-size:.62rem;background:#f1f5f9;color:#64748b;padding:.06rem .3rem;border-radius:.27rem;font-family:monospace;font-weight:700;">30s</span>
      <div style="width:7rem;height:.23rem;background:#f1f5f9;border-radius:9999px;overflow:hidden;"><div id="rotProgress" style="height:100%;background:#2B4C9B;width:100%;transition:width 1s linear;"></div></div>
    </div>
    <div class="flex items-center gap-1">
      <button class="comp-btn active" onclick="selectCompany('all')" id="cbAll">Todos</button>
      <button class="comp-btn" onclick="selectCompany('4Seniors')" id="cb4S">4Seniors</button>
      <button class="comp-btn" onclick="selectCompany('S4SYS')" id="cbS4">S4SYS</button>
      <button class="comp-btn" onclick="selectCompany('Porto Virtual')" id="cbPV">Porto Virtual</button>
      <button onclick="toggleRot()" style="padding:.2rem .38rem;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:.36rem;cursor:pointer;color:#64748b;display:flex;align-items:center;"><i data-lucide="pause" style="width:.72rem;height:.72rem;" id="rotIcon"></i></button>
    </div>
    <div style="width:1px;height:1.05rem;background:#e2e8f0;flex-shrink:0;"></div>
    <div style="display:flex;align-items:center;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:.4rem;padding:.07rem;">
      <button class="time-btn" onclick="setTime('diario')" id="t-diario">Diário</button>
      <button class="time-btn" onclick="setTime('7d')" id="t-7d">7 dias</button>
      <button class="time-btn active" onclick="setTime('30d')" id="t-30d">30 dias</button>
      <button class="time-btn" onclick="setTime('12m')" id="t-12m">12 meses</button>
      <button class="time-btn" onclick="setTime('picker')" id="t-picker">Mês/Ano</button>
      <button class="time-btn" onclick="setTime('comparar')" id="t-comparar">Comparar</button>
    </div>
    <select id="selMes" class="hidden fi" style="width:auto;padding:.2rem .52rem;font-size:.72rem;"></select>
    <div id="dateRange" class="hidden" style="display:flex;align-items:center;gap:.3rem;">
      <input type="date" id="dtInicio" class="fi" style="width:auto;padding:.2rem .4rem;font-size:.72rem;" onchange="onDateRange()">
      <span style="font-size:.7rem;color:#94a3b8;">até</span>
      <input type="date" id="dtFim" class="fi" style="width:auto;padding:.2rem .4rem;font-size:.72rem;" onchange="onDateRange()">
    </div>
    <div id="cmpBox" class="hidden" style="display:flex;align-items:center;gap:.3rem;">
      <input type="month" id="cmpA" class="fi" style="width:auto;padding:.2rem .4rem;font-size:.72rem;" onchange="renderCompare()">
      <span style="font-size:.7rem;color:#94a3b8;">vs</span>
      <input type="month" id="cmpB" class="fi" style="width:auto;padding:.2rem .4rem;font-size:.72rem;" onchange="renderCompare()">
    </div>
  </div>
</div>

<div id="mdBanner" class="hidden" style="background:linear-gradient(90deg,#2B4C9B,#1a3a6b);color:white;padding:.7rem 1.1rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;">
  <i data-lucide="plug-zap" style="width:1.1rem;height:1.1rem;flex-shrink:0;"></i>
  <div style="flex:1;min-width:13rem;"><div style="font-weight:800;font-size:.82rem;">Conectar ao Milldesk</div><div style="font-size:.68rem;opacity:.85;">Cole a chave da API (uma vez neste navegador) para carregar chamados, horas e inconsistências ao vivo.</div></div>
  <input id="mdBannerKey" type="password" placeholder="chave da API Milldesk" style="padding:.42rem .6rem;border-radius:.4rem;border:none;font-size:.75rem;min-width:15rem;flex:1;color:#1e293b;">
  <button onclick="mdConnect()" style="padding:.44rem 1.1rem;background:white;color:#2B4C9B;border:none;border-radius:.4rem;font-size:.75rem;font-weight:800;cursor:pointer;">Conectar</button>
</div>
<main class="flex-1 p-4 overflow-auto" id="main"></main>
</div>

<!-- MODAL: Contrato -->
<div id="modalContract" class="modal-ov hidden"><div class="modal-box" style="max-width:36rem;">
  <button onclick="closeModal('modalContract')" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:#94a3b8;"><i data-lucide="x" style="width:.9rem;height:.9rem;"></i></button>
  <h3 id="mCTitle" style="font-size:.87rem;font-weight:800;margin-bottom:.88rem;">Novo Contrato</h3>
  <form onsubmit="saveContract(event)" class="space-y-3">
    <input type="hidden" id="cId">
    <div class="grid grid-cols-2 gap-3">
      <div><label class="fl">Empresa do Grupo</label><select id="cEmpresa" class="fi"><option value="">— selecionar —</option><option value="4Seniors">4Seniors</option><option value="S4SYS">S4SYS</option><option value="Porto Virtual">Porto Virtual</option></select></div>
      <div><label class="fl">Cliente</label><input type="text" id="cCliente" class="fi" required placeholder="Nome do cliente"></div>
    </div>
    <div><label class="fl">Nome / Identificador</label><input type="text" id="cNome" class="fi" required placeholder="ex: Suporte N2/N3, Projetos Cloud…"></div>
    <div><label class="fl">Resumo do Escopo</label><textarea id="cResumo" class="fi" rows="2" placeholder="Escopo, observações…"></textarea></div>
    <div><label class="fl">Tecnologias (separadas por vírgula)</label><input type="text" id="cTecnologias" class="fi" placeholder="AWS, Azure, Linux, AD…"></div>
    <div class="grid grid-cols-3 gap-3">
      <div><label class="fl">Cobrança</label><select id="cTipo" class="fi" onchange="cvTipoToggle()"><option value="mensal">Mensal</option><option value="chamado">Por chamado</option><option value="interno">Interno</option></select></div>
      <div id="cValorWrap"><label class="fl">Valor Mensal (R$)</label><input type="number" id="cValor" class="fi" min="0" step="0.01" placeholder="0"></div>
      <div id="cValorChWrap" class="hidden"><label class="fl">Valor / chamado (R$)</label><input type="number" id="cValorCh" class="fi" min="0" step="0.01" placeholder="100"></div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="fl">Franquia (h/mês)</label><input type="number" id="cFranquia" class="fi" min="0" placeholder="0"></div>
      <div><label class="fl">Assinatura</label><input type="date" id="cAssinatura" class="fi"></div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="fl">SLA Atendimento (h)</label><input type="number" id="cSlaAtend" class="fi" min="0" step=".5" value="4"></div>
      <div><label class="fl">SLA Resolução (h)</label><input type="number" id="cSlaResol" class="fi" min="0" step=".5" value="24"></div>
    </div>
    <div class="grid grid-cols-2 gap-3"><div><label class="fl">Tipo de atendimento</label><select id="cAtend" class="fi"><option value="reativo">Reativo</option><option value="sustentacao">Sustentação</option><option value="chamado">Por chamado</option><option value="interno">Interno</option></select></div><div><label class="fl">Status</label><select id="cStatus" class="fi"><option value="ativo">Ativo</option><option value="pausado">Pausado</option><option value="arquivado">Arquivado</option></select></div></div>
    <div style="display:flex;justify-content:flex-end;gap:.5rem;padding-top:.68rem;border-top:1px solid #f1f5f9;">
      <button type="button" onclick="closeModal('modalContract')" style="padding:.38rem .92rem;background:#f1f5f9;border:none;border-radius:.43rem;font-size:.73rem;font-weight:700;color:#64748b;cursor:pointer;">Cancelar</button>
      <button type="submit" style="padding:.38rem 1.02rem;background:var(--brand);border:none;border-radius:.43rem;font-size:.73rem;font-weight:700;color:white;cursor:pointer;">Salvar</button>
    </div>
  </form>
</div></div>

<!-- MODAL: Funcionário -->
<div id="modalFunc" class="modal-ov hidden"><div class="modal-box">
  <button onclick="closeModal('modalFunc')" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:#94a3b8;"><i data-lucide="x" style="width:.9rem;height:.9rem;"></i></button>
  <h3 id="mFTitle" style="font-size:.87rem;font-weight:800;margin-bottom:.43rem;">Funcionário</h3>
  <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:.43rem;padding:.4rem .66rem;margin-bottom:.72rem;font-size:.68rem;color:#854d0e;">Edições não alteram registros históricos. Aplica-se apenas a cálculos futuros.</div>
  <form onsubmit="saveFunc(event)" class="space-y-3">
    <input type="hidden" id="fId">
    <div><label class="fl">Nome</label><input type="text" id="fNome" class="fi" required></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="fl">Nível</label><select id="fNivel" class="fi"><option value="N1">N1</option><option value="N2">N2</option><option value="N3">N3</option><option value="Gestão">Gestão</option><option value="LGPD">LGPD</option></select></div>
      <div><label class="fl">Equipe</label><input type="text" id="fEquipe" class="fi" placeholder="Suporte, Cloud…"></div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="fl">Salário CLT (R$/mês)</label><input type="number" id="fSalario" class="fi" min="0" placeholder="0" oninput="updateVH()"></div>
      <div><label class="fl">Capacidade (h/mês)</label><input type="number" id="fCap" class="fi" min="1" value="168" oninput="updateVH()"></div>
    </div>
    <div id="vhDisplay" style="font-size:.68rem;color:#166534;font-weight:700;"></div>
    <div>
      <label class="fl">Alocação</label>
      <div style="display:flex;gap:1.2rem;margin-bottom:.43rem;">
        <label style="display:flex;align-items:center;gap:.33rem;font-size:.74rem;cursor:pointer;"><input type="radio" name="fAloc" value="todos" id="fAlocTodos" checked onchange="toggleAlocList()"> Todos os clientes</label>
        <label style="display:flex;align-items:center;gap:.33rem;font-size:.74rem;cursor:pointer;"><input type="radio" name="fAloc" value="especifico" id="fAlocEsp" onchange="toggleAlocList()"> Clientes específicos</label>
      </div>
      <div id="fClientesList" class="hidden" style="max-height:7rem;overflow-y:auto;background:#f8fafc;border:1px solid var(--border);border-radius:.43rem;padding:.4rem .53rem;"></div>

  const contratos=(empresa==='all'?CONTRACTS:CONTRACTS.filter(c=>c.empresa===empresa)).filter(c=>c.status!=='arquivado')
  const receita=contratos.reduce((s,c)=>{const m=matchClient(c.cliente);return s+contractReceita(c,m?m.chamados:0)},0)
  const totalCusto=D.recursos.reduce((s,r)=>s+getSalario(r.nome,r.nivel),0)

  return{horas,chamados,receita,custo,margem,numContratos:contratos.length,numClientes:clis.length,clientes:clis}

// Deriva D.recursos e D.clientes a partir dos registros crus do Milldesk (worked_hour por atividade)
function mdApplyToD(raw){
  const recs={},clis={}
  raw.forEach(r=>{
    if(isExcludedTech(r.agent))return
    const wm=mdWorkedMin(r.worked_hour),cm=mdWorkedMin(r.charge_hour)
    if(r.agent){const ro=recs[r.agent]=recs[r.agent]||{nome:r.agent,trab_minutos:0,avulsa_minutos:0,ids:new Set(),lv:{}};ro.trab_minutos+=wm;ro.avulsa_minutos+=cm;ro.ids.add(r.id);if(r.level)ro.lv[r.level]=(ro.lv[r.level]||0)+1}
    const loc=r.location||'—',cc=mdCC(loc),ct=mdContractForCC(cc),nome=ct?ct.cliente:loc
    const co=clis[nome]=clis[nome]||{nome,horas_minutos:0,cobrar_minutos:0,ids:new Set()};co.horas_minutos+=wm;co.cobrar_minutos+=cm;co.ids.add(r.id)
  })
  D.recursos=Object.values(recs).map(ro=>{const f=matchFuncByAgent(ro.nome);return{nome:f?f.nome:ro.nome,nivel:f?f.nivel:(_topKey(ro.lv)||'—'),equipe:f?f.equipe:'',trab_minutos:ro.trab_minutos,avulsa_minutos:ro.avulsa_minutos,cap_minutos:(f?f.cap_horas:168)*60,chamados:ro.ids.size,mes_slug:MES}}).sort((a,b)=>b.trab_minutos-a.trab_minutos)
  D.clientes=Object.values(clis).map(c=>({nome:c.nome,horas_minutos:c.horas_minutos,cobrar_minutos:c.cobrar_minutos,chamados:c.ids.size})).sort((a,b)=>b.horas_minutos-a.horas_minutos)
  D.totalHoras=D.recursos.reduce((s,r)=>s+r.trab_minutos,0);D.totalCap=D.recursos.reduce((s,r)=>s+r.cap_minutos,0)
  D.totalChamados=D.clientes.reduce((s,c)=>s+c.chamados,0);D.fte=pct(D.totalHoras,D.totalCap)
  D.skills=D.skills||[];D.alertas=D.alertas||[];if(!('sla'in D))D.sla=null;if(!('sat'in D))D.sat=null;D._src='milldesk'
}

function getFunc(nome){return FUNCS.find(f=>f.nome===nome)||null}
function getSalario(nome,nivel){const f=getFunc(nome);return(f&&f.salario>0)?f.salario:(NIVEL_DEFAULTS[nivel]||8000)}
function getCapH(nome){const f=getFunc(nome);return(f&&f.cap_horas>0)?f.cap_horas:168}
function getVH(nome,nivel){const s=getSalario(nome,nivel),c=getCapH(nome);return c>0?s/c:0}
function getAlocLabel(f){if(!f||f.alocacao_tipo!=='especifico')return'Todos';const n=f.alocacao_clientes?.length||0;return n===0?'Todos':n===1?f.alocacao_clientes[0]:n+' clientes'}
const _norm=s=>normName(s).replace(/[^a-z0-9]/g,'')
function matchClient(cliente){if(!D.clientes)return null;const t=_norm(cliente);if(!t)return null;return D.clientes.find(c=>{const n=_norm(c.nome);return n&&(n===t||n.includes(t)||t.includes(n))})||null}
function getClientContracts(nome){
  const exact=CONTRACTS.filter(c=>c.cliente===nome&&c.status!=='arquivado');if(exact.length)return exact
  const t=_norm(nome);if(!t)return[]
  return CONTRACTS.filter(c=>{if(c.status==='arquivado')return false;const n=_norm(c.cliente);return n&&(n===t||n.includes(t)||t.includes(n))})
}
function contractReceita(c,chamados){if(!c||c.tipo_cobranca==='interno')return 0;if(c.tipo_cobranca==='chamado')return(c.valor_chamado||0)*(chamados||0);return c.valor_mensal||0}
function cliValor(nome){const cli=(D.clientes||[]).find(x=>x.nome===nome);const ch=cli?cli.chamados:0;return getClientContracts(nome).reduce((s,c)=>s+contractReceita(c,ch),0)}
function cliFranquia(nome){return getClientContracts(nome).reduce((s,c)=>s+(c.franquia_horas||0),0)}
function seedLocalData(){
  FUNCS=getFuncs();CONTRACTS=getContracts()
  const seeded=localStorage.getItem('sbi_seed_v')
  // Re-seed autoritativo a partir das bases (xls). Roda 1x por versão; sobrescreve p/ carregar os dados oficiais.
  if(seeded!==SEED_VERSION){
    FUNCS=BASE_FUNCS.map(f=>({...f,id:'func_'+normName(f.nome).replace(/[^a-z0-9]+/g,'')}));setFuncs(FUNCS)
    CONTRACTS=BASE_CONTRACTS.map(c=>({...c}));setContracts(CONTRACTS)
    if(!getSkillsLS())setSkillsLS(BASE_SKILLS.map(s=>({...s})))
    localStorage.setItem('sbi_seed_v',SEED_VERSION)
    return
  }
  if(!getSkillsLS())setSkillsLS(BASE_SKILLS.map(s=>({...s})))
  if(!FUNCS.length){FUNCS=BASE_FUNCS.map(f=>({...f,id:'func_'+normName(f.nome).replace(/[^a-z0-9]+/g,'')}));setFuncs(FUNCS)}
  if(!CONTRACTS.length){CONTRACTS=BASE_CONTRACTS.map(c=>({...c}));setContracts(CONTRACTS)}
}

function buildAutoAlerts(){
  const cfg=getAlertCfg(),auto=[],lim=cfg.limite_pct||80
  // Por técnico — só do roster ATIVO (xls). Técnico fora do roster já saiu → sem alerta de sobrecarga (item 6).
  D.recursos.forEach(r=>{
    if(!getFunc(r.nome))return
    const f=pct(r.trab_minutos,r.cap_minutos)
    if(f>cfg.fte_max)auto.push({lv:'critica',cat:'FTE',msg:`${r.nome}: FTE ${f}% — sobrecarga`,det:'Risco de burnout'})
    else if(f>=lim)auto.push({lv:'alta',cat:'Horas',msg:`${r.nome}: atingiu ${f}% da capacidade`,det:`${minToHM(r.trab_minutos)}h de ${minToHM(r.cap_minutos)}h`})
    else if(f<cfg.fte_min)auto.push({lv:'media',cat:'FTE',msg:`${r.nome}: FTE ${f}% — ocioso`,det:'Capacidade ociosa'})
  })
  // Por grupo/nível (N1, N2, N3) — agregado do roster ativo
  ;['N1','N2','N3'].forEach(nv=>{
    const g=D.recursos.filter(r=>getFunc(r.nome)&&r.nivel===nv)
    if(!g.length)return
    const trab=g.reduce((s,r)=>s+r.trab_minutos,0),cap=g.reduce((s,r)=>s+r.cap_minutos,0),f=pct(trab,cap)
    if(f>=lim)auto.push({lv:f>cfg.fte_max?'critica':'alta',cat:'Grupo',msg:`Grupo ${nv}: ${f}% da capacidade`,det:`${g.length} téc · ${minToHM(trab)}h de ${minToHM(cap)}h`})
  })
  // Por cliente — franquia contratada
  D.clientes.forEach(c=>{const fran=cliFranquia(c.nome);if(!fran)return;const uso=pct(Math.round(c.horas_minutos/60),fran);if(uso>100)auto.push({lv:'critica',cat:'Franquia',msg:`${c.nome}: ${uso}% — extrapolada`,det:`${Math.round(c.horas_minutos/60)}h vs ${fran}h`});else if(uso>=lim)auto.push({lv:'alta',cat:'Franquia',msg:`${c.nome}: ${uso}% da franquia`,det:`Atingiu ${lim}%+ das horas contratadas`})})
  if(D.sla&&D.sla.dentro_sla_pct<90)auto.push({lv:'alta',cat:'SLA',msg:`SLA: ${D.sla.dentro_sla_pct}% dentro do prazo`,det:`${D.sla.chamados_fora} chamados vencidos`})
  if(D.sat){if(D.sat.csat<75)auto.push({lv:'critica',cat:'CSAT',msg:`CSAT: ${D.sat.csat}% — crítico`,det:'Satisfação comprometida'});else if(D.sat.csat<85)auto.push({lv:'media',cat:'CSAT',msg:`CSAT: ${D.sat.csat}%`,det:'Monitorar tendência'})}
  // Custo — margem por empresa
  ;['4Seniors','S4SYS','Porto Virtual'].forEach(emp=>{const d=companyStats(emp);if(d.receita>0&&d.margem!=null){if(d.margem<0)auto.push({lv:'critica',cat:'Custo',msg:`${emp}: margem negativa (${d.margem}%)`,det:`Custo ${fmtR(d.custo)} > Receita ${fmtR(d.receita)}`});else if(d.margem<20)auto.push({lv:'media',cat:'Custo',msg:`${emp}: margem baixa (${d.margem}%)`,det:`Receita ${fmtR(d.receita)} · custo ${fmtR(d.custo)}`})}})
  const ord={critica:0,alta:1,media:2,baixa:3}
  return auto.sort((a,b)=>ord[a.lv]-ord[b.lv])
}
function buildChecklistAlerts(){
  const cfg=getAlertCfg(),out=[],hourNow=new Date().getHours(),today=todayISO(),lim=cfg.checklist_hora||12
  const daily=getChkDaily()[today]||{}
  ;(D.clientes||[]).forEach(c=>{
    const e=daily[c.nome]
    if(!e||!e.done){if(hourNow>=lim)out.push({lv:'alta',cat:'Checklist',msg:`Checklist diário não feito: ${c.nome}`,det:`Prazo ${lim}h — avisar líder técnico`})}
    else if(e.risco||hasRisk(e.obs))out.push({lv:'critica',cat:'Checklist',msg:`Risco no checklist de ${esc(c.nome)}`,det:(e.obs||'').slice(0,80)||'Marcado como risco/ação'})
  })
  const mon=getChkMonthly()[MES]||{},pend=MONTHLY_CHK.filter(i=>!Object.values(mon).some(cli=>cli&&cli[i.k]))
  if(pend.length)out.push({lv:'media',cat:'Mensal',msg:`${pend.length} atividade(s) mensal(is) não iniciada(s)`,det:pend.slice(0,4).map(i=>i.t.split('—')[0].trim()).join(', ')+(pend.length>4?'…':'')})
  return out
}

}
// Cadastro: contrato/técnico que aparece no Milldesk mas não está na lista master (Admin) → cadastrar no SeniorsTalent
function buildCadastroAlerts(){
  if(!MD.loaded)return[]
  const out=[],vC=new Set(),vT=new Set()
  MD.tickets.forEach(t=>{
    const interno=/geral/i.test(t.loc||'')||t.cc==='9'||t.cc==='10'
    if(t.loc&&!interno&&!/n[aã]o cadastrad/i.test(t.loc)&&!mdContractForCC(t.cc)&&!vC.has(t.loc)){vC.add(t.loc);out.push({lv:'alta',cat:'Cadastro',grp:'cliente',msg:`Contrato não cadastrado: ${t.loc}`,det:'Cadastrar no SeniorsTalent'})}
    if(t.ag&&!isExcludedTech(t.ag)&&!matchFuncByAgent(t.ag)&&!vT.has(t.ag)){vT.add(t.ag);out.push({lv:'alta',cat:'Cadastro',grp:'profissional',msg:`Técnico não cadastrado: ${t.ag}`,det:'Cadastrar no SeniorsTalent'})}
  })
  return out
}

  const el=document.getElementById('main')
  if(TIME==='comparar'){renderCompare();return}
  const standalone=SECTION==='admin'||(SECTION==='tech'&&['fila','checklists','incid'].includes(TECH_SUB))
  if((!MES||!D.recursos)&&!standalone){el.innerHTML='<div style="color:#94a3b8;font-size:.875rem;padding:2rem;text-align:center;">Aguardando dados do banco…<div style="font-size:.7rem;margin-top:.5rem;">A seção <b>Admin</b> e a <b>Fila de Chamados</b> (Milldesk) já estão disponíveis.</div></div>';return}
  if(SECTION==='exec'){
    const sync={geral:rExecGeral,clientes:rExecClientes,tecnico:rExecTecnico,alertas:rExecAlertas}
    el.innerHTML=(sync[EXEC_SUB]||rExecGeral)();lucide.createIcons()
  }else if(SECTION==='tech'){
    const sync={clientes:rCli,equipe:rEquipe,incid:rIncidencias,checklists:rChecklists}
    if(TECH_SUB==='historico')rTrend().then(h=>{el.innerHTML=h;lucide.createIcons()})
    else if(TECH_SUB==='fila')rFila().then(h=>{el.innerHTML=h;lucide.createIcons()})
    else if(TECH_SUB==='alertas')rAlertasTec().then(h=>{el.innerHTML=h;lucide.createIcons()})
    else{el.innerHTML=(sync[TECH_SUB]||rProd)();lucide.createIcons()}
  }else{
    const sync={contratos:rContratos,funcionarios:rFuncionarios,custos:rCustos,'sla-edit':rSLAAdmin,alertcfg:rAlertCfg}

    else{el.innerHTML=(sync[ADMIN_SUB]||rContratos)();lucide.createIcons()}

window.zbxSync=async function(){const z=getZbx();if(!z.url){toast('Configure a URL do Zabbix em Admin.',false);return}toast('Sincronizando Zabbix…')
  const base=z.url.replace(/\/+$/,''),url=base.endsWith('api_jsonrpc.php')?base:base+'/api_jsonrpc.php'
  const callRpc=async(method,params,useBearer)=>{const rpc={jsonrpc:'2.0',method,params,id:1};const headers={'Content-Type':'application/json-rpc'};if(z.token){if(useBearer)headers['Authorization']='Bearer '+z.token;else rpc.auth=z.token}const r=await fetch(url,{method:'POST',headers,body:JSON.stringify(rpc)});return r.json()}
  const probParams={output:['name','severity','clock'],recent:true,sortfield:['eventid'],sortorder:'DESC',limit:100}
  try{let bearer=true,j=await callRpc('problem.get',probParams,true)
    if(j&&j.error&&/auth|permission|token|bearer|unauthor/i.test(JSON.stringify(j.error))){bearer=false;j=await callRpc('problem.get',probParams,false)}
    if(j&&j.error)throw new Error(j.error.data||j.error.message||'erro Zabbix')
    const items=(j.result||[]).map(p=>({name:p.name,severity:p.severity,clock:p.clock}))
    const crit=items.filter(zbxCritical).length
    let groups=[]
    try{const gj=await callRpc('hostgroup.get',{output:['name'],selectHosts:'count',with_monitored_hosts:true,sortfield:'name'},bearer);groups=(gj.result||[]).map(g=>({name:g.name,hosts:Array.isArray(g.hosts)?g.hosts.length:parseInt(g.hosts||0,10)})).filter(g=>g.hosts>0).sort((a,b)=>b.hosts-a.hosts)}catch(e){}
    lsSet('sbi_zbx_last',{ts:Date.now(),count:items.length,crit,items,groups,error:''});toast('Zabbix: '+items.length+' problema(s), '+crit+' crítico(s).')
    const zs=document.getElementById('zbxStatus');if(zs){zs.textContent=' · Zabbix '+(crit?'⚠'+crit:'✓');zs.style.color=crit?'#f59e0b':'#166534';zs.title=crit?crit+' problema(s) crítico(s) ativo(s)':'Zabbix conectado, sem críticos'}
  }catch(e){lsSet('sbi_zbx_last',{ts:Date.now(),count:0,items:[],groups:[],error:(/Failed to fetch/i.test(e.message)?'CORS/rede — libere CORS no Zabbix':e.message)});const zs=document.getElementById('zbxStatus');if(zs){zs.textContent=' · Zabbix ✕';zs.style.color='#ef4444';zs.title='Falha de conexão com o Zabbix'}toast('Falha ao ler Zabbix: '+e.message,false)}
  if(SECTION==='tech'&&TECH_SUB==='alertas')renderContent()}

function mdPeriodRange(){
  const d=new Date(),ymd=x=>x.toISOString().slice(0,10)
  if(TIME==='diario'){const a=document.getElementById('dtInicio')?.value,b=document.getElementById('dtFim')?.value;if(a&&b)return a<=b?[a,b]:[b,a];const t=ymd(d);return[t,t]}
  if(TIME==='7d'||TIME==='30d'){const n=TIME==='7d'?7:30;return[ymd(new Date(d.getTime()-n*864e5)),ymd(d)]}
  if(MES&&/^\d{4}-\d{2}$/.test(MES)){const[y,m]=MES.split('-').map(Number),last=new Date(y,m,0).getDate();return[`${MES}-01`,`${MES}-${String(last).padStart(2,'0')}`]}
  return[ymd(new Date(d.getFullYear(),d.getMonth(),1)),ymd(d)]
}
window.mdSync=async function(){

  const[start,end]=mdPeriodRange(),base=cfg.base.replace(/\/+$/,'')+'/'+cfg.key
  MD.loading=true;renderContent()
  try{
    const per=await fetch(`${base}/showTicketsPerPeriod?start=${start}&end=${end}`).then(r=>r.json())
    if(per&&per.error)throw new Error(per.error)
    const rawArr=Array.isArray(per)?per:[]
    MD.tickets=rawArr.map(mdCompact).filter(t=>!isExcludedTech(t.ag))
    const uniq={};MD.tickets.forEach(t=>{if(!uniq[t.id])uniq[t.id]=t});MD.backlog=Object.values(uniq).filter(t=>mdIsOpen(t.st))
    if(!MES||TIME!=='picker')MES=start.slice(0,7)
    mdApplyToD(rawArr)
    MD.loaded=true;MD.periodo=start+' a '+end;MD.ts=Date.now();MD.loading=false
    document.getElementById('lastUpdate').textContent='Milldesk ao vivo · '+new Date().toLocaleString('pt-BR')
    const _ld=document.getElementById('liveDot'),_ls=document.getElementById('liveStatus');if(_ld)_ld.style.background='#22c55e';if(_ls)_ls.textContent='Milldesk'
    toast(`Milldesk: ${MD.tickets.length} chamados, ${minToHM(D.totalHoras)}h, ${D.recursos.length} técnicos.`)
  }catch(e){MD.loading=false;toast('Falha Milldesk: '+e.message,false)}
  renderContent()
}

function rIncidencias(){
  if(D._src==='milldesk-12m')return`<div class="card" style="color:#64748b;text-align:center;padding:2rem;">As inconsistências são analisadas por período (ticket a ticket). Selecione <b>Diário</b>, <b>7/30 dias</b> ou um <b>mês</b>.</div>`
  if(!MD.loaded)return`<div class="card" style="color:#64748b;text-align:center;padding:2rem;">Sincronize o Milldesk em <button onclick="setSub('fila')" style="color:var(--brand);background:none;border:none;cursor:pointer;font-weight:700;">Fila de Chamados</button> para detectar inconsistências de horas e contrato.</div>`
  const inc=mdInconsistencias(),treat=getIncid()
  const pend=inc.filter(x=>(treat[x.key]&&treat[x.key].status)!=='resolvido'),resolv=inc.length-pend.length
  const tb=t=>t==='Tempo'?'badge-y':t==='Contrato'?'badge-r':'badge-b'
  const rows=inc.map(x=>{const st=treat[x.key]&&treat[x.key].status,done=st==='resolvido';return`<tr style="${done?'opacity:.5;':''}"><td style="font-size:.68rem;color:#64748b;white-space:nowrap;">${esc(x.data||'—')}</td><td><span class="badge ${tb(x.tipo)}">${x.tipo}</span></td><td style="font-family:monospace;font-size:.66rem;">#${esc(x.id)}</td><td style="font-size:.7rem;">${esc(x.cliente)}</td><td style="font-size:.7rem;">${esc(x.tecnico)}</td><td style="font-size:.68rem;color:#475569;max-width:22rem;">${esc(x.motivo)}</td><td>${done?'<span class="badge badge-g">Resolvido</span>':st==='tratando'?'<span class="badge badge-y">Tratando</span>':'<span class="badge badge-r">Pendente</span>'}</td><td><button class="act-btn act-edit" onclick="openIncid('${encodeURIComponent(x.key)}')">Tratar</button></td></tr>`}).join('')
  window._INC=inc
  const rev=getApontRev(),revArr=Object.entries(rev).map(([id,v])=>({id,...v})).sort((a,b)=>(b.ts||0)-(a.ts||0))
  const revRows=revArr.map(a=>`<tr style="${a.verificado?'opacity:.55;':''}"><td style="font-weight:600;">${esc(a.tecnico||'—')}</td><td>${esc(a.cliente||'—')}</td><td style="font-size:.7rem;">${esc(a.atividade||'')}</td><td style="font-weight:700;color:#ef4444;">${esc(a.horas||'')}</td><td style="font-size:.68rem;color:#64748b;">${esc(a.motivo||'')}</td><td>${a.verificado?'<span class="badge badge-g">Verificado</span>':'<span class="badge badge-y">Pendente</span>'}</td><td><div style="display:flex;gap:.1rem;">${a.verificado?'':`<button class="act-btn act-edit" onclick="verifyApont('${a.id}')">Verificar</button>`}<button class="act-btn act-del" onclick="delApont('${a.id}')">✕</button></div></td></tr>`).join('')
  return`<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">${kpiCard(fmt(inc.length),'Inconsistências',inc.length?'#E04622':'#22c55e','search-x',MD.periodo)}${kpiCard(fmt(pend.length),'Pendentes',pend.length?'#ef4444':'#22c55e','triangle-alert')}${kpiCard(fmt(resolv),'Resolvidas','#22c55e','check-circle')}${kpiCard(fmt(inc.filter(x=>x.tipo==='Contrato').length),'Vazamento de contrato','#7c3aed','file-warning')}</div>

}

function rEquipe(){
  // Produtividade (mesclado da antiga aba Produtividade)
  const prodRows=fRec().map(r=>{const fte=pct(r.trab_minutos,r.cap_minutos),c=fte<60?'#ef4444':fte<80?'#f59e0b':'#22c55e';return`<tr><td style="font-weight:600;">${techDisp(r.nome)}</td><td><span class="tag">${r.nivel}</span></td><td style="color:#64748b;">${esc(r.equipe||'—')}</td><td>${minToHM(r.trab_minutos)}h</td><td style="color:#94a3b8;">${minToHM(r.avulsa_minutos)}h</td><td><div style="display:flex;align-items:center;gap:.43rem;"><div style="flex:1;height:.28rem;background:#f1f5f9;border-radius:9999px;min-width:3.5rem;overflow:hidden;"><div style="height:100%;width:${Math.min(fte,100)}%;background:${c};"></div></div><span style="font-size:.72rem;font-weight:800;color:${c};min-width:2.1rem;">${fte}%</span></div></td></tr>`}).join('')
  const prodCard=`<div class="card mb-4 overflow-x-auto">${ST('Produtividade por Técnico')}<table><thead><tr><th>Técnico</th><th>Nível</th><th>Equipe</th><th>H. Trabalhadas</th><th>H. Avulsas</th><th>FTE %</th></tr></thead><tbody>${prodRows||'<tr><td colspan="6" style="color:#94a3b8;padding:1.5rem;text-align:center;">Sem dados.</td></tr>'}</tbody></table></div>`
  // Matriz de conhecimento (editável — clique nas células p/ mudar o nível)
  const SK=getSkillsLS()||BASE_SKILLS
  const tecnicos=[...new Set(SK.map(s=>s.tecnico))].sort((a,b)=>a.localeCompare(b,'pt'))
  const skills=[...new Set(SK.map(s=>s.skill))].sort((a,b)=>String(a).localeCompare(String(b),'pt'))
  const bg={1:'#dbeafe',2:'#fef9c3',3:'#dcfce7'},tx={1:'#1e40af',2:'#854d0e',3:'#166534'}
  const spofs=skills.filter(sk=>SK.filter(s=>s.skill===sk&&s.nivel===3).length<2)

window.addSkill=function(){const nome=prompt('Nome da nova skill/tecnologia:');if(!nome||!nome.trim())return;const SK=getSkillsLS()||BASE_SKILLS.map(s=>({...s}));const t0=[...new Set(SK.map(s=>s.tecnico))][0]||(FUNCS[0]&&FUNCS[0].nome);if(t0)SK.push({tecnico:t0,skill:nome.trim(),nivel:1});setSkillsLS(SK);renderContent()}

window.addSkillTec=function(){const roster=FUNCS.filter(f=>!f._removed).map(f=>f.nome);const nome=prompt('Técnico a adicionar na matriz (do cadastro):\n'+roster.join(', '));if(!nome||!nome.trim())return;const SK=getSkillsLS()||BASE_SKILLS.map(s=>({...s}));const sk0=[...new Set(SK.map(s=>s.skill))][0]||'Microsoft';if(!SK.some(s=>s.tecnico===nome.trim()))SK.push({tecnico:nome.trim(),skill:sk0,nivel:1});setSkillsLS(SK);renderContent()}

function rCustos(){
  const mes=MES||new Date().toISOString().slice(0,7),list=custosDoMes(mes)
  const folhaTec=FUNCS.filter(f=>!f._removed).reduce((s,f)=>s+getSalario(f.nome,f.nivel),0)
  const totManual=list.reduce((s,c)=>s+(+c.valor||0),0),totEmpresa=folhaTec+totManual
  const receita=companyStats('all').receita,lucroTec=receita-folhaTec,lucroEmp=receita-totEmpresa,pc=v=>v>=0?'#166534':'#ef4444'
  const byDept={};list.forEach(c=>{(byDept[c.departamento||'Outros']=byDept[c.departamento||'Outros']||[]).push(c)})
  const deptBlocks=Object.entries(byDept).sort((a,b)=>b[1].reduce((s,c)=>s+(+c.valor||0),0)-a[1].reduce((s,c)=>s+(+c.valor||0),0)).map(([dep,arr])=>{
    const sub=arr.reduce((s,c)=>s+(+c.valor||0),0)
    const rows=arr.map(c=>`<tr><td style="font-size:.7rem;color:#64748b;">${esc(c.categoria||'—')}</td><td>${esc(c.descricao||'—')}</td><td style="font-weight:700;color:#854d0e;">${fmtR(c.valor)}</td><td>${c.recorrente?'<span class="badge badge-b">recorrente</span>':'<span class="badge" style="background:#f1f5f9;color:#64748b;">'+esc(c.mes||mes)+'</span>'}</td><td><button class="act-btn act-del" onclick="delCusto('${c.id}')">✕</button></td></tr>`).join('')
    return`<div style="margin-bottom:.8rem;"><div style="display:flex;justify-content:space-between;font-size:.73rem;font-weight:800;color:#334155;margin-bottom:.25rem;border-bottom:2px solid #f1f5f9;padding-bottom:.2rem;"><span>${esc(dep)}</span><span style="color:#854d0e;">${fmtR(sub)}</span></div><table><tbody>${rows}</tbody></table></div>`
  }).join('')||'<div style="color:#94a3b8;font-size:.74rem;text-align:center;padding:1rem;">Nenhum custo lançado para este mês.</div>'
  return`<div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3 mb-4">${kpiCard(fmtR(receita),'Receita','#166534','dollar-sign')}${kpiCard(fmtR(folhaTec),'Salários técnicos','#854d0e','users','do dashboard')}${kpiCard(fmtR(totManual),'Custos gerais','#E04622','receipt','manual')}${kpiCard(fmtR(totEmpresa),'Custo total empresa','#7c3aed','building-2')}${kpiCard(fmtR(lucroTec),'Lucro (só técnico)',pc(lucroTec),'trending-up','Receita − salários')}${kpiCard(fmtR(lucroEmp),'Lucro (empresa)',pc(lucroEmp),'landmark','Receita − tudo')}</div>

<button onclick="addCusto()" style="display:inline-flex;align-items:center;gap:.3rem;padding:.36rem .8rem;background:var(--brand);color:white;border:none;border-radius:.43rem;font-size:.72rem;font-weight:700;cursor:pointer;"><i data-lucide="plus" style="width:.72rem;height:.72rem;"></i>Adicionar custo</button>
<div style="font-size:.63rem;color:#94a3b8;margin-top:.5rem;line-height:1.5;">Recorrente = repete todo mês automaticamente. Não recorrente = vale só neste mês (some ao virar o mês, mas fica registrado no histórico). Os salários da equipe técnica vêm de <b>Funcionários</b> e já entram no custo total da empresa.</div></div>

const MCHK_SHORT={backup:'Backup',firmware:'Firmware',epdr:'EPDR',firewall:'Firewall',wifi:'Wi-Fi',patches:'Patches',disco:'Disco',cert:'Cert.',m365:'M365',relatorio:'Relatório'}
function rChecklists(){
  const cfg=getAlertCfg(),today=todayISO(),daily=getChkDaily()[today]||{},lim=cfg.checklist_hora||12
  const clis=D.clientes||[],roster=FUNCS.filter(f=>!f._removed).map(f=>f.nome)
  const techOpts=sel=>['<option value="">— técnico —</option>'].concat(roster.map(n=>`<option value="${esc(n)}"${sel===n?' selected':''}>${esc(n)}</option>`)).join('')
  const dRows=clis.map(c=>{const e=daily[c.nome]||{},risk=e.risco||hasRisk(e.obs),st=e.done?(risk?'<span class="badge badge-r">RISCO/AÇÃO</span>':'<span class="badge badge-g">OK</span>'):'<span class="badge badge-y">Pendente</span>'
    return`<tr><td style="font-weight:600;">${esc(c.nome)}</td><td style="text-align:center;"><input type="checkbox" ${e.done?'checked':''} onchange="saveChkD('${esc(c.nome)}','done',this.checked)" style="accent-color:var(--brand);width:1rem;height:1rem;cursor:pointer;"></td><td><select onchange="saveChkD('${esc(c.nome)}','tecnico',this.value)" class="fi" style="padding:.22rem .4rem;font-size:.7rem;max-width:9rem;">${techOpts(e.tecnico)}</select></td><td><input type="text" value="${esc(e.obs||'')}" onchange="saveChkD('${esc(c.nome)}','obs',this.value)" placeholder="observações / achados" class="fi" style="padding:.22rem .4rem;font-size:.7rem;min-width:12rem;"></td><td style="text-align:center;"><label style="font-size:.64rem;color:#64748b;cursor:pointer;"><input type="checkbox" ${e.risco?'checked':''} onchange="saveChkD('${esc(c.nome)}','risco',this.checked)" style="accent-color:#ef4444;"> risco</label></td><td>${st}</td></tr>`}).join('')
  const done=clis.filter(c=>(daily[c.nome]||{}).done).length,late=(new Date().getHours()>=lim)
  // Mensal — matriz clientes × atividades
  const mon=getChkMonthly()[MES]||{}
  const totalCells=clis.length*MONTHLY_CHK.length,doneCells=clis.reduce((s,c)=>s+MONTHLY_CHK.filter(i=>(mon[c.nome]||{})[i.k]).length,0)
  const mxRows=clis.map(c=>{const cm=mon[c.nome]||{};return`<tr><td style="font-weight:600;font-size:.72rem;white-space:nowrap;position:sticky;left:0;background:white;">${esc(c.nome)}</td>${MONTHLY_CHK.map(i=>{const on=!!cm[i.k];return`<td style="text-align:center;padding:.2rem;"><div onclick="toggleChkMx('${esc(c.nome)}','${i.k}')" class="hcell mx-auto" style="cursor:pointer;background:${on?'#dcfce7':'#f8fafc'};color:${on?'#166534':'#cbd5e1'};border:1px solid ${on?'#86efac':'#e2e8f0'};">${on?'✓':''}</div></td>`}).join('')}</tr>`}).join('')
  const colProg=MONTHLY_CHK.map(i=>{const n=clis.filter(c=>(mon[c.nome]||{})[i.k]).length;return`<td style="text-align:center;font-size:.6rem;font-weight:700;color:${n>=clis.length&&clis.length?'#166534':'#94a3b8'};">${n}/${clis.length}</td>`}).join('')
  return`<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">${kpiCard(done+'/'+clis.length,'Checklist Diário Hoje',done>=clis.length&&clis.length?'#22c55e':late?'#ef4444':'#f59e0b','clipboard-check',today.split('-').reverse().join('/'))}${kpiCard('até '+lim+'h','Prazo Diário',late?'#ef4444':'#2B4C9B','clock',late?'prazo vencido':'no prazo')}${kpiCard(doneCells+'/'+totalCells,'Mensal '+(MES||''),doneCells>=totalCells&&totalCells?'#22c55e':'#f59e0b','calendar-check','clientes × atividades')}${kpiCard(clis.length-done,'Diários Pendentes',(clis.length-done)?'#f59e0b':'#22c55e','list-todo')}</div>
<div class="card mb-4 overflow-x-auto">${ST('Checklist Diário por Cliente — '+today.split('-').reverse().join('/'))}<div style="font-size:.66rem;color:#64748b;margin-bottom:.5rem;">Selecione o técnico responsável (cadastro de Funcionários). Não preenchido até <b>${lim}h</b> gera alerta ao líder. Palavras como "erro", "falha", "offline", "vencido" marcam <b>risco</b>.</div><table><thead><tr><th>Cliente</th><th style="text-align:center;">Feito</th><th>Técnico</th><th>Observações / Achados</th><th style="text-align:center;">Risco</th><th>Status</th></tr></thead><tbody>${dRows||'<tr><td colspan="6" style="color:#94a3b8;padding:1.2rem;text-align:center;">Sem clientes carregados.</td></tr>'}</tbody></table></div>
<div class="card overflow-x-auto">${ST('Checklist Mensal Obrigatório — '+(MES||'')+' · clique para ticar por cliente')}<div style="font-size:.66rem;color:#64748b;margin-bottom:.6rem;">Marque cada atividade macro por cliente. Atividade não iniciada em nenhum cliente vira alerta.</div><table style="min-width:44rem;"><thead><tr><th style="position:sticky;left:0;background:#f8fafc;">Cliente</th>${MONTHLY_CHK.map(i=>`<th style="text-align:center;font-size:.58rem;" title="${esc(i.t)}">${MCHK_SHORT[i.k]||i.k}</th>`).join('')}</tr></thead><tbody>${mxRows||'<tr><td colspan="'+(MONTHLY_CHK.length+1)+'" style="color:#94a3b8;padding:1.2rem;text-align:center;">Sem clientes carregados.</td></tr>'}<tr style="border-top:2px solid #e2e8f0;"><td style="font-size:.6rem;font-weight:800;color:#64748b;position:sticky;left:0;background:white;">Feito em</td>${colProg}</tr></tbody></table></div>`
}
window.saveChkD=function(cliente,field,val){const all=getChkDaily(),t=todayISO();all[t]=all[t]||{};all[t][cliente]=all[t][cliente]||{};all[t][cliente][field]=val;all[t][cliente].ts=Date.now();if(field==='obs'&&hasRisk(val))all[t][cliente].risco=true;setChkDaily(all);if(SECTION==='tech'&&TECH_SUB==='checklists')renderContent();toast('Checklist salvo.')}
window.toggleChkMx=function(cli,k){const all=getChkMonthly();all[MES]=all[MES]||{};all[MES][cli]=all[MES][cli]||{};all[MES][cli][k]=!all[MES][cli][k];all[MES][cli].ts=Date.now();setChkMonthly(all);if(SECTION==='tech'&&TECH_SUB==='checklists')renderContent()}

<div style="font-size:.72rem;color:#64748b;margin-bottom:.9rem;">${esc(c.nome)} · centro de custo ${esc(c.cc||'—')}</div>
<div style="display:flex;flex-wrap:wrap;gap:.9rem;background:#f8fafc;border:1px solid var(--border);border-radius:.6rem;padding:.8rem;">${infoRow('Cobrança',cob)}${infoRow('Franquia',(c.franquia_horas||'—')+'h/mês')}${infoRow('SLA Atend./Resol.',(c.sla_atend_h??'—')+'h / '+(c.sla_resol_h??'—')+'h')}${infoRow('Assinatura',c.assinatura?c.assinatura.split('-').reverse().join('/'):'—')}${infoRow('Status',c.status)}</div>
${c.resumo?`<div style="margin-top:.7rem;"><div class="kpi-lbl">Resumo do escopo</div><div style="font-size:.75rem;color:#334155;margin-top:.15rem;line-height:1.5;">${esc(c.resumo)}</div></div>`:''}
${(c.tecnologias&&c.tecnologias.length)?`<div style="margin-top:.6rem;"><div class="kpi-lbl">Tecnologias</div><div style="margin-top:.25rem;">${techTags(c.tecnologias)}</div></div>`:''}
${kbHtml}
<div style="margin-top:.9rem;padding-top:.8rem;border-top:1px solid #f1f5f9;"><div style="font-size:.63rem;font-weight:800;color:#2B4C9B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;">Upload do contrato & análise</div>
<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;"><input type="file" id="cvFile" onchange="onContractFile('${id}',this)" style="font-size:.7rem;"><span style="font-size:.68rem;color:#166534;">${doc.fname?('📎 '+esc(doc.fname)+(doc.size?(' · '+Math.round(doc.size/1024)+'KB'):'')):''}</span></div>
<label class="fl" style="margin-top:.6rem;">Texto extraído / análise de inconsistências (obrigações, premissas, exclusões, achados)</label>
<textarea id="cvNotes" class="fi" rows="5" placeholder="Cole aqui o texto do contrato ou anote inconsistências encontradas…">${esc(doc.notes||'')}</textarea>
<button onclick="saveContractDoc('${id}')" style="margin-top:.5rem;padding:.38rem 1rem;background:var(--brand);color:white;border:none;border-radius:.43rem;font-size:.72rem;font-weight:700;cursor:pointer;">Salvar análise</button>
<div style="font-size:.62rem;color:#94a3b8;margin-top:.5rem;">O arquivo é referenciado localmente (nome/tamanho). A análise automática por IA do documento enviado exige um serviço de backend; use o campo acima para registrar a análise manual ou colar o texto extraído.</div></div>`
  openModal('modalContractView')
}
window.onContractFile=function(id,input){const f=input.files&&input.files[0];if(!f)return;const docs=getContractDocs();docs[id]={...(docs[id]||{}),fname:f.name,size:f.size,ts:Date.now()};setContractDocs(docs);toast('Arquivo anexado: '+f.name)}
window.saveContractDoc=function(id){const docs=getContractDocs();docs[id]={...(docs[id]||{}),notes:document.getElementById('cvNotes').value,ts:Date.now()};setContractDocs(docs);closeModal('modalContractView');renderContent();toast('Análise salva.')}
window.saveGatilhos=function(id){const arr=document.getElementById('cvGat').value.split('\n').map(s=>s.trim()).filter(Boolean);const all=getGatilhos();all[id]=arr;setGatilhos(all);toast('Gatilhos salvos.')}
function deleteContract(id){const c=CONTRACTS.find(x=>x.id===id);if(!c)return;confirmAction(`Remover "${c.nome}" (${c.cliente})?`,()=>{CONTRACTS=CONTRACTS.filter(x=>x.id!==id);setContracts(CONTRACTS);renderContent();toast('Removido.')})}

function updateVH(){const sal=parseFloat(document.getElementById('fSalario').value)||0,cap=parseFloat(document.getElementById('fCap').value)||168,vh=cap>0&&sal>0?sal/cap:0;document.getElementById('vhDisplay').textContent=vh>0?'Valor/hora: '+fmtR(Math.round(vh)):''}
function toggleAlocList(){const isEsp=document.getElementById('fAlocEsp').checked,list=document.getElementById('fClientesList');list.classList.toggle('hidden',!isEsp);if(isEsp&&!list.innerHTML.trim())list.innerHTML=(D.clientes||[]).map(c=>`<label style="display:flex;align-items:center;gap:.3rem;padding:.15rem .21rem;cursor:pointer;font-size:.72rem;"><input type="checkbox" name="fCli" value="${esc(c.nome)}" style="accent-color:var(--brand);"> ${esc(c.nome)}</label>`).join('')}
function openFuncNew(){document.getElementById('mFTitle').textContent='Novo Funcionário';['fId','fNome','fEquipe','fSalario'].forEach(id=>document.getElementById(id).value='');document.getElementById('fNivel').value='N1';document.getElementById('fCap').value='168';document.getElementById('vhDisplay').textContent='';document.getElementById('fAlocTodos').checked=true;document.getElementById('fClientesList').classList.add('hidden');openModal('modalFunc')}
function openFuncEdit(id){const f=FUNCS.find(x=>x.id===id);if(!f)return;document.getElementById('mFTitle').textContent='Editar Funcionário';document.getElementById('fId').value=f.id;document.getElementById('fNome').value=f.nome;document.getElementById('fNivel').value=f.nivel||'N1';document.getElementById('fEquipe').value=f.equipe||'';document.getElementById('fSalario').value=f.salario||'';document.getElementById('fCap').value=f.cap_horas||168;updateVH();const isEsp=f.alocacao_tipo==='especifico';document.getElementById(isEsp?'fAlocEsp':'fAlocTodos').checked=true;const list=document.getElementById('fClientesList');list.classList.toggle('hidden',!isEsp);if(isEsp)list.innerHTML=(D.clientes||[]).map(c=>`<label style="display:flex;align-items:center;gap:.3rem;padding:.15rem .21rem;cursor:pointer;font-size:.72rem;"><input type="checkbox" name="fCli" value="${esc(c.nome)}"${(f.alocacao_clientes||[]).includes(c.nome)?' checked':''} style="accent-color:var(--brand);"> ${esc(c.nome)}</label>`).join('');openModal('modalFunc')}
function saveFunc(e){e.preventDefault();const id=document.getElementById('fId').value||uid(),isEsp=document.getElementById('fAlocEsp').checked,clientes=[...document.querySelectorAll('[name="fCli"]:checked')].map(x=>x.value),row={id,nome:document.getElementById('fNome').value.trim(),nivel:document.getElementById('fNivel').value,equipe:document.getElementById('fEquipe').value.trim(),salario:parseFloat(document.getElementById('fSalario').value)||0,cap_horas:parseInt(document.getElementById('fCap').value)||168,alocacao_tipo:isEsp?'especifico':'todos',alocacao_clientes:isEsp?clientes:[]};const idx=FUNCS.findIndex(x=>x.id===id);if(idx>=0)FUNCS[idx]=row;else FUNCS.push(row);setFuncs(FUNCS);closeModal('modalFunc');renderContent();toast('Funcionário salvo. Histórico preservado.')}
function removeFunc(id){const f=FUNCS.find(x=>x.id===id);if(!f)return;confirmAction(`Ocultar "${f.nome}"?`,()=>{f._removed=true;setFuncs(FUNCS);renderContent();toast('Ocultado.')})}

async function saveSLA(e){e.preventDefault();const row={mes_slug:MES,tma_minutos:Math.round(parseFloat(document.getElementById('slaTMA').value)*60),tmr_minutos:Math.round(parseFloat(document.getElementById('slaTMR').value)*60),dentro_sla_pct:parseInt(document.getElementById('slaPct').value)||0,chamados_sla:parseInt(document.getElementById('slaCh').value)||0,chamados_fora:parseInt(document.getElementById('slaFora').value)||0};try{const{error}=await sb.from('sla').upsert(row,{onConflict:'mes_slug'});if(error)throw error;await loadMonth(MES);toast('SLA atualizado!')}catch(err){toast('Erro: '+err.message,false)}}
async function dismissAlerta(id){await sb.from('alertas').update({resolvido:true}).eq('id',id);D.alertas=D.alertas.filter(a=>a.id!==id);renderContent()}

function initRealtime(){sb.channel('sbi-live').on('postgres_changes',{event:'*',schema:'public',table:'meses'},async()=>{await loadMeses();if(MESES_LIST.length){MES=MESES_LIST[0].slug;await loadMonth(MES)}}).on('postgres_changes',{event:'*',schema:'public',table:'recursos'},()=>loadMonth(MES)).on('postgres_changes',{event:'*',schema:'public',table:'clientes'},()=>loadMonth(MES)).subscribe(st=>{const d=document.getElementById('liveDot'),l=document.getElementById('liveStatus');if(st==='SUBSCRIBED'){d.style.background='#22c55e';l.textContent='Live'}else{d.style.background='#f59e0b';l.textContent='Reconectando…'}})}

async function boot(){
  try{seedLocalData();await loadMeses();renderSubTabs()
    if(getZbx().token)zbxSync()
    if(getMD().key){mdSync()}
    else{document.getElementById('mdBanner').classList.remove('hidden');if(MES)await loadMonth(MES);else document.getElementById('main').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:14rem;gap:.62rem;color:#94a3b8;font-size:.875rem;text-align:center;">Conecte ao Milldesk na barra acima para carregar chamados e horas ao vivo.<br>Contratos e funcionários já estão disponíveis em <b>Admin</b>.</div>`}
    initRealtime();startRot()}
  catch(e){document.getElementById('main').innerHTML=`<div class="card" style="border-left:3px solid #ef4444;color:#ef4444;padding:1.25rem;font-size:.875rem;">Erro: ${esc(e.message)}</div>`}
  finally{document.getElementById('appVersion').textContent=APP_VERSION;document.getElementById('loading').style.display='none';document.getElementById('app').classList.remove('hidden');lucide.createIcons()}
}
document.getElementById('selMes').addEventListener('change',e=>{if(e.target.value)loadMonth(e.target.value)})
boot()
</script>
</body>
</html>
