<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeniorsBI — Apresentação</title>
<style>
:root{--brand:#2B4C9B;--accent:#E04622}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1c;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
#stage{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;background:radial-gradient(1200px 600px at 50% -10%,#16233f,#0a0f1c)}
#frameWrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:18px 44px 0}
#frameInner{width:100%;max-width:1360px;height:100%;border-radius:14px 14px 0 0;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);background:#f0f4fa;position:relative}
iframe{width:100%;height:100%;border:0;background:#f0f4fa;display:block}
#cap{position:absolute;left:0;right:0;bottom:0;padding:26px 40px 30px;background:linear-gradient(0deg,rgba(10,15,28,.97) 8%,rgba(10,15,28,.7) 55%,transparent);pointer-events:none;transform:translateY(8px);opacity:0;transition:transform .5s cubic-bezier(.2,.8,.2,1),opacity .5s}
#cap.show{transform:translateY(0);opacity:1}
#chip{display:inline-block;font-size:.7rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#9fc0ff;background:rgba(43,76,155,.4);border:1px solid rgba(159,192,255,.35);padding:.22rem .7rem;border-radius:.5rem;margin-bottom:.6rem}
#txt{font-size:1.4rem;font-weight:600;line-height:1.4;max-width:60rem;text-shadow:0 2px 12px rgba(0,0,0,.7)}
/* Barra de controles estilo player */
#bar{display:flex;align-items:center;gap:14px;padding:10px 24px;background:#0a0f1c;border-top:1px solid rgba(255,255,255,.06)}
.ctrl{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#e7edf7;width:38px;height:38px;border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s}
.ctrl:hover{background:rgba(255,255,255,.16)}.ctrl:active{transform:scale(.94)}
.ctrl.big{width:46px;height:46px;background:var(--brand);border-color:var(--brand);font-size:17px}
.ctrl.big:hover{background:#3559ad}
#track{flex:1;height:6px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;cursor:pointer}
#fill{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--accent));transition:width .4s linear}
#count{font-size:.72rem;color:#8ea2c4;min-width:52px;text-align:right;font-variant-numeric:tabular-nums}
#skip{background:none;border:none;color:#8ea2c4;font-size:.75rem;cursor:pointer;font-weight:700}
#skip:hover{color:#fff}
/* Intro */
#intro{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:2rem;
  background:radial-gradient(900px 500px at 50% 30%,#17284a,#080d18);overflow:hidden}
#intro::before{content:"";position:absolute;inset:-2px;background:
  radial-gradient(500px 300px at 15% 20%,rgba(43,76,155,.35),transparent 60%),
  radial-gradient(500px 300px at 85% 80%,rgba(224,70,34,.22),transparent 60%);animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{to{transform:translate(30px,-20px) scale(1.05)}}
.logos{display:flex;gap:16px;align-items:center;justify-content:center;margin-bottom:6px;opacity:0;transform:translateY(14px);animation:rise .8s .1s forwards}
.logos .pill{background:#fff;border-radius:12px;padding:10px 14px;height:56px;display:flex;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.logos img{height:34px;width:auto;object-fit:contain;display:block}
#intro h1{font-size:3.2rem;font-weight:900;letter-spacing:-.02em;opacity:0;transform:translateY(14px);animation:rise .8s .28s forwards}
#intro h1 span{color:var(--accent)}
#intro p{color:#a9b8d4;max-width:40rem;line-height:1.65;font-size:1.05rem;opacity:0;transform:translateY(14px);animation:rise .8s .42s forwards}
#go{margin-top:6px;background:var(--brand);color:#fff;border:none;border-radius:.8rem;padding:1rem 2.4rem;font-size:1.1rem;font-weight:800;cursor:pointer;
  box-shadow:0 14px 40px rgba(43,76,155,.5);opacity:0;transform:translateY(14px);animation:rise .8s .56s forwards;transition:transform .15s}
#go:hover{transform:translateY(-3px)}
.hint{font-size:.82rem;color:#5f7196;max-width:42rem;line-height:1.5;opacity:0;animation:fade 1s 1s forwards}
@keyframes rise{to{opacity:1;transform:translateY(0)}}@keyframes fade{to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="stage">
  <div id="frameWrap"><div id="frameInner"><iframe id="app" src="index.html"></iframe>
    <div id="cap"><div id="chip"></div><div id="txt"></div></div>
  </div></div>
  <div id="bar">
    <button class="ctrl" onclick="prev()" title="Anterior">⏮</button>
    <button class="ctrl big" id="pp" onclick="togglePlay()" title="Pausar/Continuar">⏸</button>
    <button class="ctrl" onclick="next()" title="Próximo">⏭</button>
    <div id="track" onclick="seekBar(event)"><div id="fill"></div></div>
    <span id="count">0 / 0</span>
    <button id="skip" onclick="skip()">Pular tour ▸</button>
  </div>
</div>

<div id="intro">
  <div class="logos">
    <div class="pill"><img src="4sr.png" alt="4Seniors"></div>
    <div class="pill"><img src="s4sys.jpg" alt="S4SYS"></div>
    <div class="pill"><img src="portovirtual.png" alt="Porto Virtual"></div>
  </div>
  <h1>Seniors<span>BI</span></h1>
  <p>O painel de operações do Grupo 4 Seniors. Um tour narrado, com dados reais ao vivo — do executivo ao técnico.</p>
  <button id="go" onclick="begin()">▶ Iniciar apresentação</button>
  <div class="hint">Dica: abra no <b>Microsoft Edge</b> para a narração com voz feminina neural (Francisca). Para os dados reais, conecte o Milldesk uma vez no painel antes.</div>
</div>

<script>
const F=document.getElementById('app'),chip=document.getElementById('chip'),txt=document.getElementById('txt'),cap=document.getElementById('cap');
const fill=document.getElementById('fill'),count=document.getElementById('count'),pp=document.getElementById('pp');

// [seção, sub, título, narração, alvo-do-foco(selector ou null)]
const STEPS=[
 ['exec','geral','SeniorsBI','Este é o SeniorsBI, o painel de operações do Grupo 4 Seniors, com dados reais ao vivo, vindos do Milldesk e do Zabbix.',null],
 ['exec','geral','Duas visões','O painel tem duas visões que se completam. A visão executiva traz o resultado do negócio: receita, custo e margem, para a diretoria decidir. A visão técnica traz a operação: chamados, horas e riscos, para o time entregar. A mesma verdade, em duas linguagens.',null],
 ['exec','geral','Executiva · Visão Geral','Começamos pela visão geral executiva. No topo, os números que mais importam: receita total, custo da equipe, margem, total de chamados e alertas ativos.','#demo-kpis'],
 ['exec','geral','Executiva · Resultado','Logo abaixo, o resultado aparece separado. À esquerda, a área técnica: receita menos os salários do time, que é a área que gera a receita.','#demo-pnl'],
 ['exec','geral','Executiva · Resultado','À direita, a empresa inteira: receita menos todos os custos, incluindo os outros departamentos. Assim, num olhar, o executivo entende se a margem é pressionada pela área técnica ou pelas demais áreas.','#demo-pnl'],
 ['exec','geral','Executiva · Empresas','E a posição de cada empresa do grupo: 4 Seniors, S4SYS e Porto Virtual, cada uma com sua receita, custo e margem. Tudo filtrável por dia, semana, mês ou os últimos doze meses.','#demo-empresas'],
 ['exec','clientes','Executiva · Por Clientes','Para aprofundar, a tela Por Clientes detalha cada contrato: tipo de atendimento, horas, uso da franquia, receita, custo, margem e SLA.',null],
 ['exec','tecnico','Executiva · Por Técnico','Em Por Técnico, o executivo vê horas trabalhadas, FTE, custo e alocação de cada profissional.',null],
 ['exec','alertas','Executiva · Alertas','Os alertas executivos concentram só o macro: os críticos, as inconsistências em aberto e a margem por empresa.',null],
 ['tech','fila','Técnica · Fila de Chamados','Agora a visão técnica. A fila de chamados: abertos, fechados, fora do SLA, sem atualização e reincidentes, ao vivo, com as horas de cada cliente e técnico.',null],
 ['tech','equipe','Técnica · Equipe','Em Equipe, a produtividade do time e a matriz de conhecimento, que aponta em vermelho os riscos de depender de uma única pessoa.',null],
 ['tech','clientes','Técnica · Clientes','As horas e a franquia por cliente, e as horas a cobrar, com controle de aprovação por e-mail.',null],
 ['tech','incid','Técnica · Inconsistências','As inconsistências apontam chamados fora do padrão de horas ou de contrato, com contexto, para o líder técnico tratar.',null],
 ['tech','alertas','Técnica · Alertas','E os alertas técnicos, incluindo o Zabbix, com quedas de link e de equipamento por cliente, em tempo real.',null],
 ['admin','custos','Admin · Custos','No Admin, os custos por departamento revelam o lucro real da empresa, não apenas o da área técnica.',null],
 ['exec','geral','SeniorsBI','SeniorsBI. Do executivo ao técnico, decisão com dados, em tempo real.',null]
];

let idx=0, voice=null, paused=false, running=false, safety=null;

// Pronúncia: "SeniorsBI" como em inglês (Seniors B-I)
function speechText(t){return String(t).replace(/SeniorsBI/gi,'Siniôrs Bí Ái');}
function pickVoice(){const vs=speechSynthesis.getVoices()||[];
  return vs.find(v=>/pt.?BR/i.test(v.lang)&&/francisca/i.test(v.name))
    || vs.find(v=>/pt.?BR/i.test(v.lang)&&/(natural|online)/i.test(v.name)&&/female|femin|thalita|brenda|francisca/i.test(v.name))
    || vs.find(v=>/pt.?BR/i.test(v.lang)&&/google/i.test(v.name))
    || vs.find(v=>/pt.?BR/i.test(v.lang)&&/maria|female|femin/i.test(v.name))
    || vs.find(v=>/pt.?BR/i.test(v.lang)) || vs.find(v=>/^pt/i.test(v.lang)) || vs[0] || null;}

function nav(sec,sub){try{const w=F.contentWindow;if(w&&typeof w.setSection==='function'){w.setSection(sec);if(typeof w.setSub==='function')w.setSub(sub);}}catch(e){}}
function ensureSpotStyle(){try{const d=F.contentDocument;if(d&&d.head&&!d.getElementById('__spotcss')){const st=d.createElement('style');st.id='__spotcss';st.textContent='#main.__dim > *:not(.__spot){opacity:.14;filter:saturate(.45)}#main > *{transition:opacity .7s ease,filter .7s ease,box-shadow .7s ease,transform .7s ease}.__spot{box-shadow:0 0 0 3px rgba(43,76,155,.55),0 26px 70px rgba(0,0,0,.22);border-radius:.9rem;transform:scale(1.012);position:relative;z-index:4}';d.head.appendChild(st);}}catch(e){}}
function focusTarget(sel){try{const d=F.contentDocument,m=d&&d.getElementById('main');if(!m)return;ensureSpotStyle();m.querySelectorAll('.__spot').forEach(e=>e.classList.remove('__spot'));if(sel){const el=d.querySelector(sel);if(el){m.classList.add('__dim');el.classList.add('__spot');el.scrollIntoView({behavior:'smooth',block:'center'});return;}}m.classList.remove('__dim');m.scrollTo({top:0,behavior:'smooth'});}catch(e){}}

function clearSafety(){if(safety){clearTimeout(safety);safety=null;}}
function speakCurrent(){
  const narr=STEPS[idx][3];
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(speechText(narr));
    if(voice)u.voice=voice; u.lang='pt-BR'; u.rate=1.0; u.pitch=1.02;
    u.onend=()=>{ if(!paused) advance(); };
    u.onerror=()=>{ if(!paused) advance(); };
    clearSafety(); safety=setTimeout(()=>{ if(!paused) advance(); }, Math.max(7000, narr.length*95));
    setTimeout(()=>{ try{ speechSynthesis.speak(u); }catch(e){} }, 140);
  }catch(e){ clearSafety(); safety=setTimeout(()=>{ if(!paused) advance(); }, 5000); }
}
function renderStep(){
  const s=STEPS[idx];
  nav(s[0],s[1]);
  chip.textContent=s[2]; txt.textContent=s[3];
  cap.classList.remove('show'); void cap.offsetWidth; cap.classList.add('show');
  fill.style.width=Math.round((idx+1)/STEPS.length*100)+'%';
  count.textContent=(idx+1)+' / '+STEPS.length;
  setTimeout(()=>focusTarget(s[4]), 420); // deixa o conteúdo montar antes do foco
}
function advance(){ clearSafety(); if(idx>=STEPS.length-1){ finish(); return; } idx++; renderStep(); if(!paused) speakCurrent(); }
function goTo(i){ clearSafety(); speechSynthesis.cancel(); idx=Math.max(0,Math.min(STEPS.length-1,i)); renderStep(); if(!paused) speakCurrent(); }
function next(){ goTo(idx+1); }
function prev(){ goTo(idx-1); }
function seekBar(ev){ const t=document.getElementById('track'); const r=t.getBoundingClientRect(); const frac=(ev.clientX-r.left)/r.width; goTo(Math.floor(frac*STEPS.length)); }
function togglePlay(){
  paused=!paused; pp.textContent=paused?'▶':'⏸';
  if(paused){ clearSafety(); try{speechSynthesis.pause();}catch(e){} }
  else{ try{speechSynthesis.resume();}catch(e){} // se não havia fala pausada, refala o passo atual
        if(!speechSynthesis.speaking){ speakCurrent(); } else { clearSafety(); safety=setTimeout(()=>{ if(!paused) advance(); }, 8000); } }
}
function skip(){ clearSafety(); try{speechSynthesis.cancel();}catch(e){} finish(); }
function finish(){
  clearSafety(); idx=STEPS.length-1;
  chip.textContent=''; txt.textContent='SeniorsBI — obrigado.'; fill.style.width='100%'; count.textContent=STEPS.length+' / '+STEPS.length; pp.textContent='▶'; paused=true;
  try{focusTarget(null); const w=F.contentWindow; if(w&&w.setSection){w.setSection('exec');w.setSub&&w.setSub('geral');}}catch(e){}
}
function begin(){
  if(running)return; running=true;
  document.getElementById('intro').style.display='none';
  voice=pickVoice(); speechSynthesis.onvoiceschanged=()=>{ if(!voice)voice=pickVoice(); };
  try{ speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); }catch(e){}
  idx=0; paused=false; pp.textContent='⏸';
  setTimeout(()=>{ renderStep(); speakCurrent(); }, 900);
}
window.begin=begin;
document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();togglePlay();} else if(e.code==='ArrowRight')next(); else if(e.code==='ArrowLeft')prev(); });
</script>
</body>
</html>
